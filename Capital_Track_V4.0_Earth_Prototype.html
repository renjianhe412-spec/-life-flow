<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>资本轨道 V4.0 Earth Prototype</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#020611;color:white;font-family:Arial,"Microsoft YaHei",sans-serif}
#earth{position:fixed;inset:0}
.panel{position:fixed;top:40px;left:30px;width:300px;padding:20px;background:rgba(5,15,30,.75);border:1px solid #335477;border-radius:20px;backdrop-filter:blur(15px)}
.right{left:auto;right:30px;width:340px}
h1{margin:0 0 10px;color:#6bc9ff}
.card{margin-top:15px;padding:12px;border:1px solid #29425d;border-radius:12px}
.city{display:flex;gap:10px;margin:10px 0;padding:10px;background:rgba(255,255,255,.05);border-radius:10px}
.city img{width:70px;height:50px;object-fit:cover;border-radius:8px}
button{width:100%;padding:12px;background:#0c5fa8;color:white;border:0;border-radius:10px}
</style>
</head>
<body>
<div id="earth"></div>

<div class="panel">
<h1>资本轨道</h1>
<h2>🇨🇳 中国</h2>
<p>综合 KDA：86</p>
<div class="card">
市场规模：★★★★★<br>
科技能力：★★★★★<br>
人才储备：★★★★☆<br>
地缘风险：★★★☆☆
</div>
</div>

<div class="panel right">
<h2>🏙 城市市场报表</h2>

<div class="city">
<img src="https://images.unsplash.com/photo-1548919973-5cef591cdbc9?w=200">
<div>上海<br>KDA 88<br>金融中心</div>
</div>

<div class="city">
<img src="https://images.unsplash.com/photo-1508009603885-50cf7c579365?w=200">
<div>深圳<br>KDA 86<br>科技创新</div>
</div>

<div class="city">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=200">
<div>北京<br>KDA 85<br>科研中心</div>
</div>

<button>开始征程 →</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.159.0/examples/js/controls/OrbitControls.js"></script>

<script>
const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(
45,
innerWidth/innerHeight,
0.1,
1000
);
camera.position.z=3;

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.getElementById("earth").appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.6));

const light=new THREE.DirectionalLight(0xffffff,2);
light.position.set(5,3,5);
scene.add(light);

const earth=new THREE.Mesh(
new THREE.SphereGeometry(1,128,128),
new THREE.MeshStandardMaterial({
map:new THREE.TextureLoader().load(
"https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg"
),
roughness:.8
})
);
scene.add(earth);

// 云层
const cloud=new THREE.Mesh(
new THREE.SphereGeometry(1.015,128,128),
new THREE.MeshStandardMaterial({
map:new THREE.TextureLoader().load(
"https://threejs.org/examples/textures/planets/earth_clouds_1024.png"
),
transparent:true,
opacity:.85
})
);
scene.add(cloud);

// 大气
const atmosphere=new THREE.Mesh(
new THREE.SphereGeometry(1.08,128,128),
new THREE.MeshBasicMaterial({
color:0x66ccff,
transparent:true,
opacity:.12,
side:THREE.BackSide
})
);
scene.add(atmosphere);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

function animate(){
requestAnimationFrame(animate);
earth.rotation.y+=0.0008;
cloud.rotation.y+=0.0015;
controls.update();
renderer.render(scene,camera);
}
animate();

window.onresize=()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
}
</script>
</body>
</html>
