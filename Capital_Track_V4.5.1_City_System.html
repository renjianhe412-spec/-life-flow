<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>资本轨道 V4.5.1 City System</title>
<style>
body{margin:0;background:#020611;color:white;font-family:Arial,"Microsoft YaHei";overflow:hidden}
#earth{position:absolute;inset:0}
.panel{position:absolute;top:30px;width:320px;padding:20px;background:#061225dd;border:1px solid #315070;border-radius:18px}
.left{left:25px}.right{right:25px}
h1{color:#67c9ff}
.card{margin-top:12px;padding:12px;background:#0b192c;border-radius:12px;border:1px solid #203954}
.city{display:flex;gap:12px;margin:10px 0;padding:10px;background:#101d30;border-radius:10px}
.city img{width:80px;height:55px;object-fit:cover;border-radius:8px}
.tag{font-size:12px;color:#79d5ff}
</style>
</head>
<body>
<div id="earth"></div>

<div class="panel left">
<h1>资本轨道</h1>
<h2>🇨🇳 中国 China</h2>
<div class="card">
国家综合指数 KDA 87.6<br><br>
经济实力 89<br>
科技创新 88<br>
市场潜力 91<br>
人才储备 85<br>
基础设施 90
</div>
<div class="card">
优势：<br>
✓ 完整产业链<br>
✓ 超大市场<br>
✓ 制造能力强
<br><br>
风险：<br>
⚠ 人口结构变化<br>
⚠ 国际竞争
</div>
</div>

<div class="panel right">
<h2>🏙 选择城市</h2>

<div class="city">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Shanghai_skyline_from_the_bund.jpg/320px-Shanghai_skyline_from_the_bund.jpg">
<div>上海 Shanghai<br>KDA 88.3<br><span class="tag">金融 科技 贸易</span></div>
</div>

<div class="city">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Beijing_skyline.jpg/320px-Beijing_skyline.jpg">
<div>北京 Beijing<br>KDA 85.6<br><span class="tag">科研 政策 教育</span></div>
</div>

<div class="city">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/Shenzhen_skyline.jpg/320px-Shenzhen_skyline.jpg">
<div>深圳 Shenzhen<br>KDA 87.2<br><span class="tag">AI 创新 制造</span></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
<script>
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,100);
camera.position.z=3;

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.getElementById("earth").appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,.8));
let light=new THREE.DirectionalLight(0xffffff,2);
light.position.set(5,3,5);scene.add(light);

let earth=new THREE.Mesh(
new THREE.SphereGeometry(1,128,128),
new THREE.MeshStandardMaterial({
map:new THREE.TextureLoader().load(
"https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg")
}));
scene.add(earth);

let clouds=new THREE.Mesh(
new THREE.SphereGeometry(1.015,128,128),
new THREE.MeshStandardMaterial({
map:new THREE.TextureLoader().load(
"https://threejs.org/examples/textures/planets/earth_clouds_1024.png"),
transparent:true,opacity:.8
}));
scene.add(clouds);

function loop(){
requestAnimationFrame(loop);
earth.rotation.y+=0.001;
clouds.rotation.y+=0.0015;
renderer.render(scene,camera);
}
loop();
</script>
</body>
</html>
