<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>资本轨道 · Globe.GL 地球测试</title>
<style>
  :root{--bg:#020611;--panel:rgba(5,14,27,.78);--line:rgba(121,171,220,.22);--text:#f5f8ff;--muted:#8fa5bf;--blue:#69c7ff;--cyan:#8eeaff;--gold:#ffd27f}
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020611;color:var(--text);font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
  body{background:radial-gradient(circle at 50% 30%,#0a1e38 0,#020611 48%,#01030a 100%)}
  #globeViz{position:fixed;inset:0;z-index:1}
  .stars,.stars:before,.stars:after{position:fixed;inset:0;content:"";pointer-events:none;z-index:0;background-repeat:repeat}
  .stars{background-image:radial-gradient(1px 1px at 40px 90px,#fff,transparent 2px),radial-gradient(1px 1px at 180px 230px,#89c7ff,transparent 2px),radial-gradient(1px 1px at 330px 40px,#fff,transparent 2px),radial-gradient(1.5px 1.5px at 500px 170px,#fff,transparent 2px),radial-gradient(1px 1px at 740px 250px,#9ccfff,transparent 2px);background-size:820px 480px;opacity:.55;animation:drift 70s linear infinite}
  .stars:before{background-image:radial-gradient(1px 1px at 20px 30px,#fff,transparent 2px),radial-gradient(1px 1px at 120px 80px,#fff,transparent 2px),radial-gradient(1px 1px at 280px 150px,#9ecfff,transparent 2px),radial-gradient(1px 1px at 430px 50px,#fff,transparent 2px),radial-gradient(1px 1px at 650px 120px,#fff,transparent 2px);background-size:700px 420px;opacity:.35;animation:drift2 95s linear infinite reverse}
  @keyframes drift{to{transform:translate3d(-70px,30px,0)}}
  @keyframes drift2{to{transform:translate3d(60px,-25px,0)}}
  .topbar{position:fixed;left:20px;right:20px;top:max(16px,env(safe-area-inset-top));z-index:5;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}
  .brand{pointer-events:auto}.brand h1{margin:0;font-size:24px;letter-spacing:.02em}.brand h1 span{color:var(--blue)}.brand p{margin:5px 0 0;color:var(--muted);font-size:11px;letter-spacing:.08em}
  .status{pointer-events:auto;display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.chip{padding:8px 11px;border:1px solid var(--line);background:rgba(4,13,25,.56);backdrop-filter:blur(12px);border-radius:999px;font-size:10px;color:#cbd9ea}
  .leftpanel{position:fixed;z-index:5;left:20px;top:112px;width:280px;padding:16px;border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(18px);border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.25)}
  .leftpanel h2{margin:0;font-size:24px}.leftpanel small{display:block;color:var(--muted);margin-top:5px}.leftpanel p{font-size:11px;line-height:1.7;color:#b7c6d8}.score{display:flex;align-items:end;gap:8px;margin:14px 0}.score b{font-size:42px;color:var(--blue)}.score span{font-size:11px;color:var(--muted);padding-bottom:7px}
  .row{display:grid;grid-template-columns:1fr auto;gap:10px;padding:9px 0;border-top:1px solid rgba(121,171,220,.12);font-size:11px}.row span{color:var(--muted)}.row b{font-weight:700}
  .note{margin-top:12px;padding:10px;border:1px solid rgba(121,171,220,.14);background:rgba(13,33,56,.42);border-radius:12px;font-size:10px;line-height:1.6;color:#a9bdd2}
  .zoom{position:fixed;z-index:6;left:320px;top:50%;transform:translateY(-50%);display:grid;gap:8px}
  .zoom button{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:rgba(5,15,28,.78);backdrop-filter:blur(12px);color:var(--text);font-size:22px;cursor:pointer}
  .zoom button:active{transform:scale(.96)}
  .bottom{position:fixed;z-index:5;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%);display:flex;gap:8px;align-items:center;padding:8px;border:1px solid var(--line);background:rgba(4,13,25,.65);backdrop-filter:blur(16px);border-radius:18px;max-width:min(94vw,900px);overflow:auto;scrollbar-width:none}
  .bottom::-webkit-scrollbar{display:none}.bottom button{white-space:nowrap;border:1px solid rgba(121,171,220,.14);background:#081522;color:#a9bdd2;border-radius:12px;padding:10px 14px;font-size:11px;cursor:pointer}.bottom button.active,.bottom button:hover{border-color:#63c8ff;color:#fff;background:#0e2c47;box-shadow:0 0 0 3px rgba(99,200,255,.08)}
  .hint{position:fixed;z-index:5;right:20px;bottom:86px;padding:10px 12px;border:1px solid var(--line);background:rgba(4,13,25,.58);backdrop-filter:blur(12px);border-radius:12px;font-size:10px;color:#9fb3ca}
  .planet{position:fixed;z-index:0;border-radius:50%;pointer-events:none;filter:saturate(1.1);box-shadow:inset -18px -20px 30px rgba(0,0,0,.55),0 0 40px rgba(120,170,255,.08);opacity:.72}
  .p1{width:58px;height:58px;right:14%;top:10%;background:linear-gradient(135deg,#b0926b,#6e5942 52%,#2b211c)}
  .p2{width:34px;height:34px;left:25%;top:12%;background:linear-gradient(135deg,#9d6a48,#4e2b22 58%,#140e0e)}
  .p3{width:46px;height:46px;right:9%;bottom:18%;background:linear-gradient(135deg,#3d74a1,#1e3b5d 58%,#09121f)}
  .p4{width:28px;height:28px;left:13%;bottom:15%;background:linear-gradient(135deg,#8a8b88,#4b4b4a 58%,#171717)}
  .country-label{font-family:Inter,"PingFang SC",sans-serif;color:#f4f8ff;font-weight:700;font-size:12px;text-shadow:0 2px 5px #000,0 0 10px rgba(0,0,0,.9);white-space:nowrap;pointer-events:none}
  .continent-label{font-family:Inter,"PingFang SC",sans-serif;color:#d7e9ff;font-weight:800;font-size:18px;text-shadow:0 2px 8px #000,0 0 16px rgba(80,170,255,.35);white-space:nowrap;pointer-events:none;letter-spacing:.08em}
  @media(max-width:900px){.leftpanel{width:245px;left:12px;top:98px;padding:13px}.zoom{left:auto;right:12px;top:46%}.topbar{left:12px;right:12px}.brand h1{font-size:21px}.status{display:none}.hint{right:12px;bottom:80px}.bottom{bottom:max(12px,env(safe-area-inset-bottom));max-width:96vw}.p1,.p3{display:none}}
  @media(max-width:640px){.leftpanel{width:210px}.leftpanel p,.note{display:none}.score b{font-size:34px}.row{padding:7px 0}.brand p{display:none}}
</style>
<script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
</head>
<body>
<div class="stars"></div>
<div class="planet p1"></div><div class="planet p2"></div><div class="planet p3"></div><div class="planet p4"></div>
<div id="globeViz"></div>
<header class="topbar">
  <div class="brand"><h1>资本轨道 <span>EARTH TEST</span></h1><p>GLOBE.GL · REALISTIC EARTH PROTOTYPE</p></div>
  <div class="status"><span class="chip">真实纹理</span><span class="chip">云层 + 云影</span><span class="chip">国家边界</span><span class="chip">点击聚焦</span></div>
</header>
<aside class="leftpanel">
  <h2 id="countryName">中国</h2><small id="countryMeta">China · Asia</small>
  <div class="score"><b id="countryScore">82</b><span>KDA / 100</span></div>
  <p id="countryText">当前只是地球交互测试版。点击国家后，地球会自动聚焦，并展示国家名称、区域和测试评分。</p>
  <div class="row"><span>经济与增长</span><b id="m1">79</b></div>
  <div class="row"><span>AI与数字治理</span><b id="m2">84</b></div>
  <div class="row"><span>地缘与安全</span><b id="m3">68</b></div>
  <div class="row"><span>人口与就业</span><b id="m4">61</b></div>
  <div class="note">这页不会替换游戏首页。先验证地球是否够真实、能否稳定旋转、缩放和点击国家。</div>
</aside>
<div class="zoom"><button id="zoomIn" aria-label="放大">＋</button><button id="zoomOut" aria-label="缩小">−</button><button id="resetView" aria-label="重置">⌖</button></div>
<nav class="bottom" id="regionBar">
  <button data-region="asia" class="active">亚洲</button><button data-region="europe">欧洲</button><button data-region="northamerica">北美洲</button><button data-region="southamerica">南美洲</button><button data-region="africa">非洲</button><button data-region="oceania">大洋洲</button>
</nav>
<div class="hint">拖动旋转 · 双指/滚轮缩放 · 点击国家边界聚焦</div>
<script type="module">
  import * as THREE from 'https://esm.sh/three';

  const EARTH_IMG = 'https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg';
  const BUMP_IMG = 'https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png';
  const SKY_IMG = 'https://cdn.jsdelivr.net/npm/three-globe/example/img/night-sky.png';
  const CLOUDS_IMG = 'https://cdn.jsdelivr.net/gh/vasturiano/globe.gl/example/clouds/clouds.png';
  const COUNTRIES_URL = 'https://cdn.jsdelivr.net/gh/vasturiano/globe.gl/example/datasets/ne_110m_admin_0_countries.geojson';

  const regions = {
    asia:{lat:30,lng:100,altitude:1.75},
    europe:{lat:51,lng:12,altitude:1.75},
    northamerica:{lat:42,lng:-102,altitude:1.75},
    southamerica:{lat:-17,lng:-60,altitude:1.8},
    africa:{lat:6,lng:20,altitude:1.85},
    oceania:{lat:-25,lng:136,altitude:1.78}
  };

  const continentLabels = [
    {name:'亚洲',lat:34,lng:95,alt:0.018,kind:'continent'},
    {name:'欧洲',lat:51,lng:17,alt:0.018,kind:'continent'},
    {name:'非洲',lat:6,lng:20,alt:0.018,kind:'continent'},
    {name:'北美洲',lat:45,lng:-105,alt:0.018,kind:'continent'},
    {name:'南美洲',lat:-15,lng:-60,alt:0.018,kind:'continent'},
    {name:'大洋洲',lat:-25,lng:135,alt:0.018,kind:'continent'}
  ];
  const countryLabels = [
    {name:'中国',lat:35,lng:103,alt:0.02},{name:'俄罗斯',lat:58,lng:90,alt:0.02},{name:'日本',lat:37,lng:138,alt:0.02},{name:'韩国',lat:36,lng:128,alt:0.02},{name:'印度',lat:22,lng:79,alt:0.02},{name:'新加坡',lat:1.3,lng:103.8,alt:0.02},{name:'澳大利亚',lat:-25,lng:134,alt:0.02},{name:'美国',lat:39,lng:-98,alt:0.02},{name:'加拿大',lat:56,lng:-106,alt:0.02},{name:'巴西',lat:-10,lng:-53,alt:0.02},{name:'英国',lat:54,lng:-2.5,alt:0.02},{name:'德国',lat:51,lng:10,alt:0.02},{name:'法国',lat:46,lng:2,alt:0.02},{name:'南非',lat:-30,lng:24,alt:0.02}
  ];

  const world = new Globe(document.getElementById('globeViz'), { animateIn:false, rendererConfig:{antialias:true,alpha:true} })
    .globeImageUrl(EARTH_IMG)
    .bumpImageUrl(BUMP_IMG)
    .backgroundImageUrl(SKY_IMG)
    .backgroundColor('#020611')
    .showAtmosphere(true)
    .atmosphereColor('#69bfff')
    .atmosphereAltitude(0.14)
    .htmlElementsData([...continentLabels,...countryLabels])
    .htmlLat(d=>d.lat)
    .htmlLng(d=>d.lng)
    .htmlAltitude(d=>d.alt)
    .htmlElement(d=>{ const el=document.createElement('div'); el.className=d.kind==='continent'?'continent-label':'country-label'; el.textContent=d.name; return el; });

  world.controls().autoRotate = true;
  world.controls().autoRotateSpeed = 0.22;
  world.controls().enableDamping = true;
  world.controls().dampingFactor = 0.08;
  world.pointOfView({lat:28,lng:104,altitude:1.78},0);

  const globeMaterial = world.globeMaterial();
  globeMaterial.bumpScale = 8;
  globeMaterial.shininess = 10;
  globeMaterial.specular = new THREE.Color('#1c4266');

  // 云影层：更贴近地表、略微偏移、深色透明。
  new THREE.TextureLoader().load(CLOUDS_IMG, texture=>{
    texture.colorSpace = THREE.SRGBColorSpace;
    const radius = world.getGlobeRadius();
    const shadow = new THREE.Mesh(
      new THREE.SphereGeometry(radius*1.003,75,75),
      new THREE.MeshPhongMaterial({map:texture,transparent:true,opacity:0.17,color:new THREE.Color('#1a2a3a'),depthWrite:false})
    );
    shadow.rotation.y = 0.018;
    world.scene().add(shadow);

    const clouds = new THREE.Mesh(
      new THREE.SphereGeometry(radius*1.009,75,75),
      new THREE.MeshPhongMaterial({map:texture,transparent:true,opacity:0.82,depthWrite:false})
    );
    world.scene().add(clouds);

    (function animateClouds(){
      clouds.rotation.y += -0.000035;
      shadow.rotation.y += -0.000031;
      requestAnimationFrame(animateClouds);
    })();
  });

  let selectedCountry = 'China';
  let hoverCountry = null;
  const normalizeName = props => props.ADMIN || props.NAME || props.SOVEREIGNT || 'Unknown';

  fetch(COUNTRIES_URL).then(r=>r.json()).then(data=>{
    const features=data.features.filter(f=>f.properties.ISO_A2!=='AQ');
    world
      .polygonsData(features)
      .polygonAltitude(f=>normalizeName(f)===selectedCountry?0.012:0.003)
      .polygonCapColor(f=>normalizeName(f)===selectedCountry?'rgba(42,158,255,.22)':normalizeName(f)===hoverCountry?'rgba(120,205,255,.10)':'rgba(0,0,0,0)')
      .polygonSideColor(()=> 'rgba(20,80,130,.04)')
      .polygonStrokeColor(f=>normalizeName(f)===selectedCountry?'#6bd8ff':'rgba(185,215,240,.42)')
      .polygonLabel(({properties:p})=>`<div style="padding:7px 9px"><b>${p.ADMIN}</b><br><span style="color:#9fc8e8">点击聚焦国家</span></div>`)
      .onPolygonHover(f=>{hoverCountry=f?normalizeName(f):null;world.polygonCapColor(world.polygonCapColor()).polygonStrokeColor(world.polygonStrokeColor());document.body.style.cursor=f?'pointer':'default';})
      .onPolygonClick((f,event,coords)=>{
        selectedCountry=normalizeName(f);
        world
          .polygonAltitude(d=>normalizeName(d)===selectedCountry?0.012:0.003)
          .polygonCapColor(d=>normalizeName(d)===selectedCountry?'rgba(42,158,255,.22)':normalizeName(d)===hoverCountry?'rgba(120,205,255,.10)':'rgba(0,0,0,0)')
          .polygonStrokeColor(d=>normalizeName(d)===selectedCountry?'#6bd8ff':'rgba(185,215,240,.42)');
        world.pointOfView({lat:coords.lat,lng:coords.lng,altitude:1.38},1100);
        showCountry(selectedCountry,f.properties.CONTINENT||'');
      });
  }).catch(err=>{console.error(err);document.querySelector('.hint').textContent='国家边界数据加载失败，请检查网络后刷新';});

  function hashScore(name,seed){let h=seed;for(const c of name)h=(h*33+c.charCodeAt(0))>>>0;return 58+(h%31)}
  function showCountry(name,continent){
    const cnMap={China:'中国','United States of America':'美国',Russia:'俄罗斯',Japan:'日本',India:'印度',Germany:'德国',France:'法国','United Kingdom':'英国',Brazil:'巴西',Australia:'澳大利亚',Canada:'加拿大','South Africa':'南非'};
    const display=cnMap[name]||name;
    document.getElementById('countryName').textContent=display;
    document.getElementById('countryMeta').textContent=`${name} · ${continent||'World'}`;
    const vals=[hashScore(name,7),hashScore(name,19),hashScore(name,43),hashScore(name,61)];
    document.getElementById('countryScore').textContent=Math.round(vals.reduce((a,b)=>a+b,0)/4);
    ['m1','m2','m3','m4'].forEach((id,i)=>document.getElementById(id).textContent=vals[i]);
    document.getElementById('countryText').textContent='当前为地球交互测试评分。正式版会接入经济、AI、地缘、人口、气候、能源等完整 KDA 模型。';
  }

  document.getElementById('zoomIn').onclick=()=>{const p=world.pointOfView();world.pointOfView({...p,altitude:Math.max(.55,p.altitude*.78)},450)};
  document.getElementById('zoomOut').onclick=()=>{const p=world.pointOfView();world.pointOfView({...p,altitude:Math.min(3.4,p.altitude*1.28)},450)};
  document.getElementById('resetView').onclick=()=>world.pointOfView({lat:28,lng:104,altitude:1.78},900);

  document.querySelectorAll('[data-region]').forEach(btn=>btn.onclick=()=>{
    document.querySelectorAll('[data-region]').forEach(x=>x.classList.toggle('active',x===btn));
    world.pointOfView(regions[btn.dataset.region],900);
  });

  window.addEventListener('resize',()=>world.width(window.innerWidth).height(window.innerHeight));
</script>
</body>
</html>
