<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>资本轨道 · Globe.GL 地球测试 V2</title>
<style>
:root{--bg:#020611;--panel:rgba(5,14,27,.78);--line:rgba(121,171,220,.22);--text:#f5f8ff;--muted:#8fa5bf;--blue:#69c7ff}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020611;color:var(--text);font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
body{background:radial-gradient(circle at 50% 30%,#0a1e38 0,#020611 48%,#01030a 100%)}
#globeViz{position:fixed;inset:0;z-index:1}
.top{position:fixed;left:20px;right:20px;top:max(16px,env(safe-area-inset-top));z-index:5;display:flex;justify-content:space-between;pointer-events:none}
.brand{pointer-events:auto}.brand h1{margin:0;font-size:24px}.brand h1 span{color:var(--blue)}.brand p{margin:5px 0 0;color:var(--muted);font-size:11px}
.panel{position:fixed;z-index:5;left:20px;top:112px;width:280px;padding:16px;border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(18px);border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.25)}
.panel h2{margin:0;font-size:24px}.panel small{display:block;color:var(--muted);margin-top:4px}.score{display:flex;align-items:end;gap:8px;margin:14px 0}.score b{font-size:42px;color:var(--blue)}.score span{font-size:11px;color:var(--muted);padding-bottom:7px}.row{display:grid;grid-template-columns:1fr auto;padding:9px 0;border-top:1px solid rgba(121,171,220,.12);font-size:11px}.row span{color:var(--muted)}
.controls{position:fixed;z-index:6;left:320px;top:50%;transform:translateY(-50%);display:grid;gap:8px}.controls button{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:rgba(5,15,28,.78);color:#fff;font-size:22px}
.bottom{position:fixed;z-index:5;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%);display:flex;gap:8px;padding:8px;border:1px solid var(--line);background:rgba(4,13,25,.68);backdrop-filter:blur(16px);border-radius:18px;max-width:94vw;overflow:auto;scrollbar-width:none}.bottom button{white-space:nowrap;border:1px solid rgba(121,171,220,.14);background:#081522;color:#a9bdd2;border-radius:12px;padding:10px 14px;font-size:11px}.bottom button.active{border-color:#63c8ff;color:#fff;background:#0e2c47}
#status{position:fixed;z-index:8;right:20px;bottom:84px;padding:10px 12px;border:1px solid var(--line);background:rgba(4,13,25,.78);border-radius:12px;font-size:11px;color:#b8cae0;max-width:360px}
.country-label{color:#fff;font-weight:700;font-size:12px;text-shadow:0 2px 6px #000,0 0 12px #000;white-space:nowrap;pointer-events:none}
.continent-label{color:#d7e9ff;font-weight:800;font-size:18px;text-shadow:0 2px 8px #000,0 0 16px rgba(80,170,255,.35);white-space:nowrap;pointer-events:none}
@media(max-width:900px){.panel{width:245px;left:12px;top:98px}.controls{left:auto;right:12px}.top{left:12px;right:12px}.brand h1{font-size:21px}.bottom{bottom:max(12px,env(safe-area-inset-bottom))}#status{right:12px;bottom:78px}}
</style>
<script>
window.globeLibFailed=false;
function globeLoadError(){window.globeLibFailed=true;window.addEventListener('DOMContentLoaded',()=>{const s=document.getElementById('status');if(s)s.textContent='Globe.GL 库加载失败：请刷新或关闭 VPN 后再试。';});}
</script>
<script src="https://cdn.jsdelivr.net/npm/globe.gl" onerror="globeLoadError()"></script>
</head>
<body>
<div id="globeViz"></div>
<header class="top"><div class="brand"><h1>资本轨道 <span>EARTH TEST V2</span></h1><p>GLOBE.GL · BASIC COMPATIBILITY BUILD</p></div></header>
<aside class="panel"><h2 id="countryName">中国</h2><small id="countryMeta">China · Asia</small><div class="score"><b id="score">82</b><span>KDA / 100</span></div><div class="row"><span>经济与增长</span><b>79</b></div><div class="row"><span>AI与数字治理</span><b>84</b></div><div class="row"><span>地缘与安全</span><b>68</b></div><div class="row"><span>人口与就业</span><b>61</b></div></aside>
<div class="controls"><button id="zin">＋</button><button id="zout">−</button><button id="reset">⌖</button></div>
<nav class="bottom"><button data-r="asia" class="active">亚洲</button><button data-r="europe">欧洲</button><button data-r="northamerica">北美洲</button><button data-r="southamerica">南美洲</button><button data-r="africa">非洲</button><button data-r="oceania">大洋洲</button></nav>
<div id="status">正在加载地球…</div>
<script>
(function(){
  const status=document.getElementById('status');
  window.addEventListener('error',e=>{status.textContent='运行错误：'+(e.message||'未知错误');});
  if(window.globeLibFailed || typeof Globe==='undefined'){status.textContent='Globe.GL 没有加载成功，请刷新页面。';return;}
  try{
    const world=new Globe(document.getElementById('globeViz'),{animateIn:false})
      .globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png')
      .backgroundImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/night-sky.png')
      .backgroundColor('#020611')
      .showAtmosphere(true)
      .atmosphereColor('#69bfff')
      .atmosphereAltitude(0.14);

    world.controls().autoRotate=true;world.controls().autoRotateSpeed=0.22;world.controls().enableDamping=true;world.controls().dampingFactor=0.08;
    world.pointOfView({lat:28,lng:104,altitude:1.78},0);
    status.textContent='地球已加载：拖动旋转 · 双指/滚轮缩放';

    const regions={asia:{lat:30,lng:100,altitude:1.75},europe:{lat:51,lng:12,altitude:1.75},northamerica:{lat:42,lng:-102,altitude:1.75},southamerica:{lat:-17,lng:-60,altitude:1.8},africa:{lat:6,lng:20,altitude:1.85},oceania:{lat:-25,lng:136,altitude:1.78}};
    document.querySelectorAll('[data-r]').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('[data-r]').forEach(x=>x.classList.toggle('active',x===btn));world.pointOfView(regions[btn.dataset.r],900);});
    document.getElementById('zin').onclick=()=>{const p=world.pointOfView();world.pointOfView({lat:p.lat,lng:p.lng,altitude:Math.max(.55,p.altitude*.78)},450)};
    document.getElementById('zout').onclick=()=>{const p=world.pointOfView();world.pointOfView({lat:p.lat,lng:p.lng,altitude:Math.min(3.4,p.altitude*1.28)},450)};
    document.getElementById('reset').onclick=()=>world.pointOfView({lat:28,lng:104,altitude:1.78},900);

    fetch('https://cdn.jsdelivr.net/gh/vasturiano/globe.gl/example/datasets/ne_110m_admin_0_countries.geojson')
      .then(r=>r.json()).then(data=>{
        let selected='China';
        const nm=f=>f.properties.ADMIN||f.properties.NAME||'Unknown';
        const fs=data.features.filter(f=>f.properties.ISO_A2!=='AQ');
        world.polygonsData(fs)
          .polygonAltitude(f=>nm(f)===selected?0.012:0.003)
          .polygonCapColor(f=>nm(f)===selected?'rgba(42,158,255,.22)':'rgba(0,0,0,0)')
          .polygonSideColor(()=> 'rgba(20,80,130,.04)')
          .polygonStrokeColor(f=>nm(f)===selected?'#6bd8ff':'rgba(185,215,240,.42)')
          .polygonLabel(({properties:p})=>`<div style="padding:7px 9px"><b>${p.ADMIN}</b><br><span style="color:#9fc8e8">点击聚焦</span></div>`)
          .onPolygonClick((f,event,coords)=>{selected=nm(f);world.polygonAltitude(d=>nm(d)===selected?0.012:0.003).polygonCapColor(d=>nm(d)===selected?'rgba(42,158,255,.22)':'rgba(0,0,0,0)').polygonStrokeColor(d=>nm(d)===selected?'#6bd8ff':'rgba(185,215,240,.42)');world.pointOfView({lat:coords.lat,lng:coords.lng,altitude:1.38},900);document.getElementById('countryName').textContent=selected;document.getElementById('countryMeta').textContent=(f.properties.CONTINENT||'World')+' · Globe.GL';});
        status.textContent='地球与国家边界已加载完成';
      }).catch(()=>{status.textContent='地球已加载；国家边界数据暂时未加载。';});
  }catch(err){status.textContent='启动失败：'+err.message;console.error(err);}
})();
</script>
</body>
</html>
