<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>资本轨道 · Globe.GL 地球测试 V3.1</title>
<style>
:root{
  --bg:#020611;--panel:rgba(5,14,27,.80);--panel2:rgba(9,24,42,.80);
  --line:rgba(121,171,220,.22);--text:#f5f8ff;--muted:#8fa5bf;
  --blue:#69c7ff;--cyan:#8eeaff;--green:#68e0ae;--orange:#ffbd72;--red:#ff7d7d
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020611;color:var(--text);font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
body{background:radial-gradient(circle at 50% 28%,#0a1e38 0,#020611 48%,#01030a 100%)}
button{font:inherit}
#globeViz{position:fixed;inset:0;z-index:1}
.top{position:fixed;left:20px;right:20px;top:max(16px,env(safe-area-inset-top));z-index:5;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}
.brand{pointer-events:auto}.brand h1{margin:0;font-size:24px;letter-spacing:.02em}.brand h1 span{color:var(--blue)}.brand p{margin:5px 0 0;color:var(--muted);font-size:11px;letter-spacing:.08em}
.badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.badge{pointer-events:auto;padding:8px 11px;border:1px solid var(--line);background:rgba(4,13,25,.60);backdrop-filter:blur(14px);border-radius:999px;font-size:10px;color:#c7d8e8}
.panel{position:fixed;z-index:5;left:20px;top:112px;width:300px;max-height:calc(100vh - 170px);overflow:auto;padding:16px;border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(18px);border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.28);scrollbar-width:none}
.panel::-webkit-scrollbar{display:none}.country-head{display:flex;align-items:center;gap:10px}.flag{width:36px;height:24px;border-radius:3px;background:linear-gradient(135deg,#d43c3c,#aa2424);display:grid;place-items:center;font-size:12px;color:#ffd85c}.panel h2{margin:0;font-size:24px}.panel small{display:block;color:var(--muted);margin-top:4px}
.scoreline{display:flex;justify-content:space-between;align-items:flex-end;margin:14px 0 8px}.score{display:flex;align-items:end;gap:8px}.score b{font-size:44px;color:var(--blue);line-height:1}.score span{font-size:11px;color:var(--muted);padding-bottom:5px}.trend{font-size:11px;color:var(--green);padding-bottom:5px}.model-note{font-size:10px;line-height:1.6;color:#9fb3ca;margin:0 0 10px}
.metric{display:grid;grid-template-columns:112px 1fr 30px;gap:8px;align-items:center;padding:8px 0;border-top:1px solid rgba(121,171,220,.12);font-size:10px}.metric span{color:var(--muted)}.bar{height:5px;background:#10253b;border-radius:999px;overflow:hidden}.bar i{display:block;height:100%;width:50%;background:linear-gradient(90deg,#2e8fd8,#77d9ff);border-radius:999px;transition:width .45s ease}.metric b{text-align:right;font-size:11px}
.pressures{margin-top:12px}.pressures h3{font-size:11px;margin:0 0 8px}.chips{display:flex;flex-wrap:wrap;gap:6px}.chip{padding:6px 8px;border:1px solid rgba(121,171,220,.14);background:#091827;border-radius:999px;font-size:9px;color:#b9c9da}.chip.warn{border-color:rgba(255,189,114,.28);color:#ffd29a}.chip.risk{border-color:rgba(255,125,125,.28);color:#ffabab}
.controls{position:fixed;z-index:6;left:340px;top:50%;transform:translateY(-50%);display:grid;gap:8px}.controls button{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:rgba(5,15,28,.80);backdrop-filter:blur(12px);color:#fff;font-size:22px;cursor:pointer}.controls button:active{transform:scale(.96)}
.bottom{position:fixed;z-index:5;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%);display:flex;gap:8px;padding:8px;border:1px solid var(--line);background:rgba(4,13,25,.70);backdrop-filter:blur(16px);border-radius:18px;max-width:94vw;overflow:auto;scrollbar-width:none}.bottom::-webkit-scrollbar{display:none}.bottom button{white-space:nowrap;border:1px solid rgba(121,171,220,.14);background:#081522;color:#a9bdd2;border-radius:12px;padding:10px 14px;font-size:11px;cursor:pointer}.bottom button.active{border-color:#63c8ff;color:#fff;background:#0e2c47;box-shadow:0 0 0 3px rgba(99,200,255,.08)}
#status{position:fixed;z-index:8;right:20px;bottom:84px;padding:10px 12px;border:1px solid var(--line);background:rgba(4,13,25,.80);backdrop-filter:blur(12px);border-radius:12px;font-size:10px;color:#b8cae0;max-width:380px}
.legend{position:fixed;right:20px;top:112px;z-index:5;padding:12px;border:1px solid var(--line);background:rgba(4,13,25,.62);backdrop-filter:blur(14px);border-radius:14px;font-size:9px;color:#9fb3ca}.legend b{display:block;color:#e9f3ff;font-size:11px;margin-bottom:6px}.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.country-label{color:#fff;font-weight:700;font-size:12px;text-shadow:0 2px 6px #000,0 0 12px #000;white-space:nowrap;pointer-events:none}.continent-label{color:#d7e9ff;font-weight:800;font-size:18px;text-shadow:0 2px 8px #000,0 0 16px rgba(80,170,255,.35);white-space:nowrap;pointer-events:none}
@media(max-width:900px){.panel{width:255px;left:12px;top:98px;max-height:calc(100vh - 150px)}.controls{left:auto;right:12px}.top{left:12px;right:12px}.brand h1{font-size:21px}.badges,.legend{display:none}.bottom{bottom:max(12px,env(safe-area-inset-bottom))}#status{right:12px;bottom:78px}.metric{grid-template-columns:98px 1fr 28px}}
@media(max-width:640px){.panel{width:220px;padding:13px}.model-note,.pressures{display:none}.score b{font-size:36px}.metric{grid-template-columns:1fr 30px}.metric .bar{display:none}.brand p{display:none}}
</style>
<script>
window.globeLibFailed=false;
function globeLoadError(){window.globeLibFailed=true;window.addEventListener('DOMContentLoaded',()=>{const s=document.getElementById('status');if(s)s.textContent='Globe.GL 库加载失败，请刷新页面。';});}
</script>
<script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/globe.gl@2.31.0/dist/globe.gl.min.js" onerror="globeLoadError()"></script>
</head>
<body>
<div id="globeViz"></div>
<header class="top">
  <div class="brand"><h1>资本轨道 <span>EARTH TEST V3.1</span></h1><p>GLOBE.GL · CLOUDS · DYNAMIC KDA</p></div>
  <div class="badges"><span class="badge">真实纹理</span><span class="badge">动态云层</span><span class="badge">云影</span><span class="badge">动态 KDA</span></div>
</header>
<aside class="panel">
  <div class="country-head"><div class="flag">★</div><div><h2 id="countryName">中国</h2><small id="countryMeta">China · Asia</small></div></div>
  <div class="scoreline"><div class="score"><b id="score">82</b><span>KDA / 100</span></div><div class="trend" id="trend">未来5年 ↗</div></div>
  <p class="model-note">KDA 是游戏内部综合指标，不是官方统计。点击不同国家后，评分与结构会重新计算。</p>
  <div class="metric"><span>经济与金融</span><div class="bar"><i id="bar-econ"></i></div><b id="econ">79</b></div>
  <div class="metric"><span>科技与 AI</span><div class="bar"><i id="bar-tech"></i></div><b id="tech">84</b></div>
  <div class="metric"><span>地缘与安全</span><div class="bar"><i id="bar-geo"></i></div><b id="geo">68</b></div>
  <div class="metric"><span>人口与就业</span><div class="bar"><i id="bar-demo"></i></div><b id="demo">61</b></div>
  <div class="metric"><span>气候与资源</span><div class="bar"><i id="bar-climate"></i></div><b id="climate">67</b></div>
  <div class="metric"><span>社会与治理</span><div class="bar"><i id="bar-gov"></i></div><b id="gov">76</b></div>
  <div class="pressures"><h3>结构性压力</h3><div class="chips" id="pressureChips"><span class="chip warn">老龄化</span><span class="chip risk">地缘竞争</span></div></div>
</aside>
<div class="controls"><button id="zin" aria-label="放大">＋</button><button id="zout" aria-label="缩小">−</button><button id="reset" aria-label="重置">⌖</button></div>
<nav class="bottom"><button data-r="asia" class="active">亚洲</button><button data-r="europe">欧洲</button><button data-r="northamerica">北美洲</button><button data-r="southamerica">南美洲</button><button data-r="africa">非洲</button><button data-r="oceania">大洋洲</button></nav>
<div class="legend"><b>地球视觉层</b><div><span class="dot"></span>云层正在缓慢旋转</div><div style="margin-top:5px">深色云影贴近地表</div></div>
<div id="status">正在加载地球…</div>
<script>
(function(){
  const status=document.getElementById('status');
  window.addEventListener('error',e=>{status.textContent='运行错误：'+(e.message||'未知错误');});
  if(window.globeLibFailed || typeof Globe==='undefined'){status.textContent='Globe.GL 主库未加载：请确认已上传 V3.1 文件。';return;}

  const regions={
    asia:{lat:30,lng:100,altitude:1.75},europe:{lat:51,lng:12,altitude:1.75},northamerica:{lat:42,lng:-102,altitude:1.75},southamerica:{lat:-17,lng:-60,altitude:1.8},africa:{lat:6,lng:20,altitude:1.85},oceania:{lat:-25,lng:136,altitude:1.78}
  };
  const cnNames={
    China:'中国','United States of America':'美国',Russia:'俄罗斯',Japan:'日本',India:'印度',Germany:'德国',France:'法国','United Kingdom':'英国',Brazil:'巴西',Australia:'澳大利亚',Canada:'加拿大','South Africa':'南非',Singapore:'新加坡',Switzerland:'瑞士','South Korea':'韩国','Saudi Arabia':'沙特阿拉伯','United Arab Emirates':'阿联酋',Italy:'意大利',Spain:'西班牙',Mexico:'墨西哥',Indonesia:'印度尼西亚',Türkiye:'土耳其',Turkey:'土耳其'
  };

  // 游戏模拟基准。主流国家使用显式结构；其余国家使用“洲际基线 + 稳定哈希扰动”。
  const explicitProfiles={
    China:{econ:88,tech:92,geo:72,demo:60,climate:70,gov:78,pressures:['老龄化','地缘竞争','地方债务'],trend:'未来5年 ↗'},
    'United States of America':{econ:91,tech:96,geo:69,demo:74,climate:65,gov:76,pressures:['高债务','政治极化','供应链竞争'],trend:'未来5年 ↗'},
    Russia:{econ:58,tech:69,geo:42,demo:52,climate:68,gov:55,pressures:['制裁压力','战争风险','人口压力'],trend:'未来5年 →'},
    Japan:{econ:81,tech:90,geo:83,demo:45,climate:63,gov:91,pressures:['深度老龄化','低生育','能源依赖'],trend:'未来5年 →'},
    Germany:{econ:84,tech:86,geo:79,demo:57,climate:78,gov:91,pressures:['制造转型','能源成本','老龄化'],trend:'未来5年 →'},
    France:{econ:80,tech:82,geo:80,demo:70,climate:77,gov:86,pressures:['财政压力','社会分化'],trend:'未来5年 →'},
    'United Kingdom':{econ:83,tech:88,geo:82,demo:72,climate:76,gov:88,pressures:['生产率压力','住房成本'],trend:'未来5年 ↗'},
    India:{econ:82,tech:81,geo:72,demo:88,climate:55,gov:68,pressures:['极端高温','基础设施缺口','青年就业'],trend:'未来5年 ↗'},
    Singapore:{econ:95,tech:93,geo:91,demo:63,climate:72,gov:95,pressures:['市场规模小','低生育','外部依赖'],trend:'未来5年 ↗'},
    Switzerland:{econ:94,tech:89,geo:95,demo:72,climate:84,gov:97,pressures:['高成本','人口老龄化'],trend:'未来5年 ↗'},
    'South Korea':{econ:88,tech:94,geo:65,demo:39,climate:71,gov:88,pressures:['超低生育','地缘风险','产业集中'],trend:'未来5年 →'},
    Canada:{econ:87,tech:84,geo:93,demo:82,climate:75,gov:94,pressures:['住房成本','生产率压力'],trend:'未来5年 ↗'},
    Australia:{econ:88,tech:82,geo:91,demo:80,climate:65,gov:94,pressures:['极端天气','资源依赖'],trend:'未来5年 ↗'},
    Brazil:{econ:73,tech:68,geo:84,demo:76,climate:62,gov:66,pressures:['财政波动','气候压力','治理波动'],trend:'未来5年 ↗'},
    'United Arab Emirates':{econ:91,tech:86,geo:78,demo:84,climate:48,gov:82,pressures:['水资源','地区安全','能源转型'],trend:'未来5年 ↗'},
    'Saudi Arabia':{econ:86,tech:79,geo:70,demo:82,climate:45,gov:70,pressures:['能源转型','水资源','地区安全'],trend:'未来5年 ↗'}
  };
  const continentBase={
    Asia:{econ:72,tech:70,geo:66,demo:72,climate:62,gov:65},Europe:{econ:80,tech:79,geo:82,demo:62,climate:76,gov:86},Africa:{econ:59,tech:53,geo:58,demo:83,climate:54,gov:57},'North America':{econ:84,tech:86,geo:86,demo:74,climate:70,gov:83},'South America':{econ:68,tech:62,geo:78,demo:77,climate:63,gov:65},Oceania:{econ:82,tech:78,geo:90,demo:78,climate:68,gov:91},'Seven seas':{econ:60,tech:58,geo:65,demo:68,climate:60,gov:62}
  };
  const weights={econ:.25,tech:.20,geo:.20,demo:.15,climate:.10,gov:.10};
  function stableOffset(name,key){let h=2166136261;const s=name+'|'+key;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return (h>>>0)%17-8}
  function clamp(v){return Math.max(35,Math.min(97,Math.round(v)))}
  function getProfile(name,continent){if(explicitProfiles[name])return explicitProfiles[name];const b=continentBase[continent]||continentBase['Seven seas'];const p={};for(const k of ['econ','tech','geo','demo','climate','gov'])p[k]=clamp(b[k]+stableOffset(name,k));p.pressures=['融资环境','就业转型','气候适应'];p.trend=(stableOffset(name,'trend')>1?'未来5年 ↗':stableOffset(name,'trend')<-2?'未来5年 ↘':'未来5年 →');return p}
  function kda(p){return Math.round(Object.entries(weights).reduce((sum,[k,w])=>sum+p[k]*w,0))}

  try{
    const world=new Globe(document.getElementById('globeViz'),{animateIn:false})
      .globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png')
      .backgroundImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/night-sky.png')
      .backgroundColor('#020611')
      .showAtmosphere(true)
      .atmosphereColor('#69bfff')
      .atmosphereAltitude(0.16);

    world.controls().autoRotate=true;world.controls().autoRotateSpeed=0.18;world.controls().enableDamping=true;world.controls().dampingFactor=0.08;
    world.pointOfView({lat:28,lng:104,altitude:1.78},0);

    // 地球材质优化
    try{
      const material=world.globeMaterial();
      material.bumpScale=7;
      material.shininess=12;
      if(window.THREE) material.specular=new THREE.Color('#274f73');
    }catch(e){}

    // 动态云层 + 云影。失败时不影响主地球。
    if(window.THREE){
      const CLOUDS='https://cdn.jsdelivr.net/gh/vasturiano/globe.gl/example/clouds/clouds.png';
      new THREE.TextureLoader().load(CLOUDS,texture=>{
        texture.colorSpace=THREE.SRGBColorSpace;
        const radius=world.getGlobeRadius();
        const shadow=new THREE.Mesh(
          new THREE.SphereGeometry(radius*1.003,72,72),
          new THREE.MeshPhongMaterial({map:texture,transparent:true,opacity:.16,color:new THREE.Color('#152535'),depthWrite:false})
        );
        shadow.rotation.y=.024;
        world.scene().add(shadow);

        const clouds=new THREE.Mesh(
          new THREE.SphereGeometry(radius*1.009,72,72),
          new THREE.MeshPhongMaterial({map:texture,transparent:true,opacity:.80,depthWrite:false})
        );
        world.scene().add(clouds);

        (function animateClouds(){
          clouds.rotation.y-=0.000034;
          shadow.rotation.y-=0.000029;
          requestAnimationFrame(animateClouds);
        })();
        status.textContent='V3.1：地球、国家边界、云层与云影已加载完成';
      },undefined,()=>{status.textContent='地球已加载；云层纹理加载失败，但不影响交互。';});
    }

    function setBar(id,val){document.getElementById(id).textContent=val;document.getElementById('bar-'+id).style.width=val+'%'}
    function showCountry(name,continent){
      const p=getProfile(name,continent);const score=kda(p);
      document.getElementById('countryName').textContent=cnNames[name]||name;
      document.getElementById('countryMeta').textContent=name+' · '+(continent||'World');
      document.getElementById('score').textContent=score;
      document.getElementById('trend').textContent=p.trend;
      ['econ','tech','geo','demo','climate','gov'].forEach(k=>setBar(k,p[k]));
      const box=document.getElementById('pressureChips');box.innerHTML='';
      p.pressures.forEach((t,i)=>{const s=document.createElement('span');s.className='chip '+(i===1?'risk':'warn');s.textContent=t;box.appendChild(s)});
    }
    showCountry('China','Asia');

    document.querySelectorAll('[data-r]').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('[data-r]').forEach(x=>x.classList.toggle('active',x===btn));world.pointOfView(regions[btn.dataset.r],900)});
    document.getElementById('zin').onclick=()=>{const p=world.pointOfView();world.pointOfView({lat:p.lat,lng:p.lng,altitude:Math.max(.55,p.altitude*.78)},450)};
    document.getElementById('zout').onclick=()=>{const p=world.pointOfView();world.pointOfView({lat:p.lat,lng:p.lng,altitude:Math.min(3.4,p.altitude*1.28)},450)};
    document.getElementById('reset').onclick=()=>world.pointOfView({lat:28,lng:104,altitude:1.78},900);

    fetch('https://cdn.jsdelivr.net/gh/vasturiano/globe.gl/example/datasets/ne_110m_admin_0_countries.geojson')
      .then(r=>r.json()).then(data=>{
        let selected='China',hovered=null;
        const nm=f=>f.properties.ADMIN||f.properties.NAME||'Unknown';
        const fs=data.features.filter(f=>f.properties.ISO_A2!=='AQ');
        const refresh=()=>world
          .polygonAltitude(f=>nm(f)===selected?.013:.0025)
          .polygonCapColor(f=>nm(f)===selected?'rgba(42,158,255,.20)':nm(f)===hovered?'rgba(90,180,255,.08)':'rgba(0,0,0,0)')
          .polygonSideColor(()=> 'rgba(20,80,130,.035)')
          .polygonStrokeColor(f=>nm(f)===selected?'#6bd8ff':'rgba(195,220,240,.40)');
        world.polygonsData(fs)
          .polygonLabel(({properties:p})=>{const pr=getProfile(p.ADMIN,p.CONTINENT||'World');return `<div style="padding:7px 9px"><b>${cnNames[p.ADMIN]||p.ADMIN}</b><br><span style="color:#69c7ff">KDA ${kda(pr)}</span><br><span style="color:#9fc8e8">点击聚焦</span></div>`})
          .onPolygonHover(f=>{hovered=f?nm(f):null;refresh();document.body.style.cursor=f?'pointer':'default'})
          .onPolygonClick((f,event,coords)=>{selected=nm(f);refresh();world.pointOfView({lat:coords.lat,lng:coords.lng,altitude:1.34},900);showCountry(selected,f.properties.CONTINENT||'World')});
        refresh();
        status.textContent=window.THREE?'国家边界已加载，正在加载云层…':'地球与国家边界已加载完成';
      }).catch(()=>{status.textContent='地球已加载；国家边界数据暂时未加载。';});
  }catch(err){status.textContent='启动失败：'+err.message;console.error(err)}
})();
</script>
</body>
</html>
