<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Earth Render Core V2 · iPad Single File</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#05080c;
}
canvas{
  display:block;
  width:100%;
  height:100%;
  touch-action:none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

const URLS = {
  day: 'https://eoimages.gsfc.nasa.gov/images/imagerecords/73000/73751/world.topo.bathy.200407.3x5400x2700.jpg',
  normal: 'https://threejs.org/examples/textures/planets/earth_normal_2048.jpg',
  clouds: 'https://threejs.org/examples/textures/planets/earth_clouds_1024.png'
};

function configureTexture(texture, renderer, colorSpace) {
  texture.colorSpace = colorSpace;
  texture.minFilter = THREE.LinearFilter;
  texture.magFilter = THREE.LinearFilter;
  texture.generateMipmaps = false;
  texture.anisotropy = Math.min(
    16,
    renderer.capabilities.getMaxAnisotropy()
  );
  texture.wrapS = THREE.ClampToEdgeWrapping;
  texture.wrapT = THREE.ClampToEdgeWrapping;
  texture.needsUpdate = true;
  return texture;
}

async function loadTexture(loader, url, renderer, colorSpace) {
  const texture = await loader.loadAsync(url);
  return configureTexture(texture, renderer, colorSpace);
}

function makeTransparentTexture() {
  const data = new Uint8Array([0, 0, 0, 0]);
  const tex = new THREE.DataTexture(data, 1, 1);
  tex.needsUpdate = true;
  return tex;
}

async function createEarthRenderer(canvas) {
  const renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true,
    powerPreference: 'high-performance'
  });

  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.setClearColor(0x05080c, 1);

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(
    40,
    window.innerWidth / window.innerHeight,
    0.01,
    100
  );
  camera.position.set(0, 0.08, 3.15);

  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.055;
  controls.enablePan = false;
  controls.minDistance = 1.85;
  controls.maxDistance = 5.0;

  const loader = new THREE.TextureLoader();
  loader.setCrossOrigin('anonymous');

  let dayMap;
  let normalMap;
  let cloudMap;

  try {
    dayMap = await loadTexture(
      loader,
      URLS.day,
      renderer,
      THREE.SRGBColorSpace
    );
  } catch (error) {
    throw new Error('NASA 地球纹理加载失败：' + error.message);
  }

  try {
    normalMap = await loadTexture(
      loader,
      URLS.normal,
      renderer,
      THREE.NoColorSpace
    );
  } catch (error) {
    normalMap = null;
    console.warn('Normal map unavailable; continuing without it.', error);
  }

  try {
    cloudMap = await loadTexture(
      loader,
      URLS.clouds,
      renderer,
      THREE.SRGBColorSpace
    );
  } catch (error) {
    cloudMap = makeTransparentTexture();
    console.warn('Cloud map unavailable; continuing without clouds.', error);
  }

  const earthGroup = new THREE.Group();
  earthGroup.rotation.x = THREE.MathUtils.degToRad(-5);
  earthGroup.rotation.y = THREE.MathUtils.degToRad(-112);
  scene.add(earthGroup);

  // Stable base renderer:
  // standard sphere UVs + MeshStandardMaterial + high-res NASA texture.
  const earthMaterial = new THREE.MeshStandardMaterial({
    map: dayMap,
    normalMap: normalMap || null,
    normalScale: new THREE.Vector2(0.42, 0.42),
    roughness: 0.86,
    metalness: 0.0,
    color: 0xffffff
  });

  const earth = new THREE.Mesh(
    new THREE.SphereGeometry(1.0, 256, 256),
    earthMaterial
  );
  earthGroup.add(earth);

  // Natural lighting, no front-facing fill spotlight.
  const hemi = new THREE.HemisphereLight(
    new THREE.Color(0xe4edf4),
    new THREE.Color(0x15191f),
    0.42
  );
  scene.add(hemi);

  const sun = new THREE.DirectionalLight(
    new THREE.Color(0xfff3df),
    2.25
  );
  sun.position.set(-4.5, 1.0, 3.5);
  scene.add(sun);

  // Cloud shadow: continuous luminance mask, no hard threshold.
  const cloudShadowMaterial = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    uniforms: {
      uCloud: { value: cloudMap },
      uOpacity: { value: 0.11 }
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      uniform sampler2D uCloud;
      uniform float uOpacity;
      varying vec2 vUv;

      void main() {
        vec3 c = texture2D(uCloud, vUv).rgb;
        float luma = dot(c, vec3(0.299, 0.587, 0.114));
        float alpha = clamp(luma * 0.95, 0.0, 1.0) * uOpacity;
        gl_FragColor = vec4(vec3(0.02, 0.035, 0.045), alpha);
      }
    `
  });

  const cloudShadow = new THREE.Mesh(
    new THREE.SphereGeometry(1.003, 256, 256),
    cloudShadowMaterial
  );
  earthGroup.add(cloudShadow);

  // Main cloud layer:
  // RGB luminance -> smooth alpha.
  // No alpha-channel misuse, no binary threshold, no nearest sampling.
  const cloudMaterial = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    uniforms: {
      uCloud: { value: cloudMap },
      uOpacity: { value: 0.66 },
      uSunDir: {
        value: sun.position.clone().normalize()
      }
    },
    vertexShader: `
      varying vec2 vUv;
      varying vec3 vWorldNormal;

      void main() {
        vUv = uv;
        vWorldNormal = normalize(mat3(modelMatrix) * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;

      uniform sampler2D uCloud;
      uniform float uOpacity;
      uniform vec3 uSunDir;

      varying vec2 vUv;
      varying vec3 vWorldNormal;

      void main() {
        vec3 c = texture2D(uCloud, vUv).rgb;
        float luma = dot(c, vec3(0.299, 0.587, 0.114));

        // Continuous alpha; this is the critical anti-mosaic fix.
        float alpha = smoothstep(0.02, 0.88, luma) * uOpacity;

        float ndl = max(
          dot(normalize(vWorldNormal), normalize(uSunDir)),
          0.0
        );

        vec3 shadowCloud = vec3(0.42, 0.46, 0.49);
        vec3 sunCloud = vec3(0.86, 0.87, 0.88);
        vec3 cloudColor = mix(
          shadowCloud,
          sunCloud,
          0.32 + 0.68 * ndl
        );

        gl_FragColor = vec4(cloudColor, alpha);
      }
    `
  });

  const clouds = new THREE.Mesh(
    new THREE.SphereGeometry(1.012, 256, 256),
    cloudMaterial
  );
  earthGroup.add(clouds);

  // Thin atmosphere shell, no neon ring.
  const atmosphereMaterial = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    side: THREE.BackSide,
    uniforms: {
      uColor: { value: new THREE.Color(0x7ea6bc) }
    },
    vertexShader: `
      varying float vFresnel;

      void main() {
        vec3 n = normalize(normalMatrix * normal);
        vec3 viewDir = normalize(
          -(modelViewMatrix * vec4(position, 1.0)).xyz
        );

        vFresnel = pow(
          1.0 - max(dot(n, viewDir), 0.0),
          4.0
        );

        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;

      uniform vec3 uColor;
      varying float vFresnel;

      void main() {
        gl_FragColor = vec4(
          uColor,
          vFresnel * 0.10
        );
      }
    `
  });

  const atmosphere = new THREE.Mesh(
    new THREE.SphereGeometry(1.035, 256, 256),
    atmosphereMaterial
  );
  earthGroup.add(atmosphere);

  const clock = new THREE.Clock();

  function render() {
    requestAnimationFrame(render);

    const dt = Math.min(clock.getDelta(), 0.033);

    earthGroup.rotation.y += dt * 0.003;
    clouds.rotation.y += dt * 0.008;
    cloudShadow.rotation.y += dt * 0.006;

    controls.update();
    renderer.render(scene, camera);
  }

  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;

    camera.aspect = w / h;
    camera.updateProjectionMatrix();

    renderer.setSize(w, h, false);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  }

  window.addEventListener('resize', resize, { passive: true });

  render();

  return {
    renderer,
    scene,
    camera,
    controls,
    earthGroup,
    earth,
    clouds,
    cloudShadow,
    atmosphere
  };
}

const canvas = document.getElementById('c');

createEarthRenderer(canvas).catch(error => {
  console.error(error);
  document.body.innerHTML =
    '<pre style="color:#fff;padding:20px;white-space:pre-wrap;font:14px/1.5 monospace">' +
    '渲染启动失败：\n' +
    error.message +
    '</pre>';
});
</script>
</body>
</html>
