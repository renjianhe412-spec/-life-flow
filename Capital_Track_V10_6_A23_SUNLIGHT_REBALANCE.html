  // Raycasting
  const raycaster=new THREE.Raycaster();
  const pointer=new THREE.Vector2();
  let pointerDownPos=null;
  let dragging=false;
  let activePointerId=null;
  let lastX=0,lastY=0,pinchDistance=0;

  function hitTestCountry(clientX,clientY){
    const rect=canvas.getBoundingClientRect();

    pointer.x=
      ((clientX-rect.left)/rect.width)*2-1;

    pointer.y=
      -((clientY-rect.top)/rect.height)*2+1;

    raycaster.setFromCamera(pointer,camera);

    const hit=
      raycaster.intersectObject(earth,false)[0];

    if(!hit){
      return null;
    }

    // Critical:
    // Convert the hit back into the globe's LOCAL sphere coordinates.
    // Then test directly against precomputed spherical polygons.
    const localPoint=earthGroup
      .worldToLocal(hit.point.clone())
      .normalize();

    const {lat,lng}=vector3ToLatLng(localPoint);
    const chinaContext=
      selectedCountryCode==='CHN' &&
      (appState==='country' || appState==='province');

    if(chinaContext){
      const provincePrepared=findCountryFeatureSpherical(
        preparedProvinceFeatures,
        localPoint
      );

      if(provincePrepared){
        return {
          lat,
          lng,
          layer:'province',
          feature:provincePrepared.feature,
          code:provincePrepared.code
        };
      }

      // Cross-context fallback: when the click falls outside every Chinese
      // province, retry against the complete world country mesh. This allows
      // direct Guangdong -> Russia style navigation without a manual Back step.
      const worldPrepared=findCountryFeatureSpherical(
        preparedFeatures,
        localPoint
      );

      return {
        lat,
        lng,
        layer:'world',
        feature:worldPrepared?.feature || null,
        code:worldPrepared?.code || null,
        fallbackFromProvince:true
      };
    }

    const worldPrepared=findCountryFeatureSpherical(
      preparedFeatures,
      localPoint
    );

    return {
      lat,
      lng,
      layer:'world',
      feature:worldPrepared?.feature || null,
      code:worldPrepared?.code || null,
      fallbackFromProvince:false
    };
  }

  function onPointerDown(e){
    // Automatic navigation owns the globe until its transition completes.
    if(cameraTransitionActive || flyAnimation || !interactionManager.enabled){
      return;
    }

    cameraManager.invalidateIntent();

    if(!interactionManager.beginDrag()) return;

    dragging=true;
    activePointerId=e.pointerId;
    lastX=e.clientX;
    lastY=e.clientY;
    pointerDownPos={x:e.clientX,y:e.clientY};

    try{
      canvas.setPointerCapture?.(e.pointerId);
    }catch(error){
      console.warn('Pointer capture unavailable',error);
    }
  }

  function onPointerMove(e){
    if(!dragging) return;

    const dx=e.clientX-lastX;
    const dy=e.clientY-lastY;

    interactionManager.handleDrag(dx,dy);

    lastX=e.clientX;
    lastY=e.clientY;
  }

  function forceReleaseDrag(){
    dragging=false;
    pointerDownPos=null;
    interactionManager.endDrag();

    if(activePointerId!==null){
      try{
        if(canvas.hasPointerCapture?.(activePointerId)){
          canvas.releasePointerCapture(activePointerId);
        }
      }catch(error){
        console.warn('Pointer release failed',error);
      }
    }

    activePointerId=null;
  }

  function onPointerUp(e){
    const wasTap=pointerDownPos &&
      Math.hypot(e.clientX-pointerDownPos.x,e.clientY-pointerDownPos.y)<8;

    dragging=false;
    interactionManager.endDrag();

    if(wasTap){
      // Map clicks are authoritative navigation requests. A city selection must
      // first be reduced to its parent layer so hit testing uses the correct
      // GeoJSON set. No camera move happens here; the new selection owns the
      // single transition that follows.
      if(appState==='city' || navigationState.level==='city'){
        exitCityToParent({fly:false,restorePanel:true});
      }

      const result=hitTestCountry(e.clientX,e.clientY);
      if(result?.code){
        let selected=false;

        // Layer 1: an exact province polygon owns the click.
        if(result.layer==='province'){
          selected=selectProvince(
            result.code,
            {source:'globe',fly:true}
          );
        }else if(
          result.layer==='world' &&
          result.fallbackFromProvince &&
          result.code==='CHN'
        ){
          // Layer 2: inside China's national polygon, but outside every
          // available province polygon (coastal water, data seam or gap).
          showToast('未识别到具体省级地区');
          console.warn(
            '[Capital Track] China polygon hit without province match:',
            {lat:result.lat,lng:result.lng}
          );
          selected=true;
        }else{
          // Layer 3: a different world country was hit. Release the China-only
          // context without moving the camera; the new country owns the one
          // authoritative transition.
          if(
            result.fallbackFromProvince &&
            COUNTRY_DATA[result.code]
          ){
            releaseChinaDrilldownContext({restorePanel:true});
          }

          selected=selectCountry(
            result.code,
            {source:'globe',fly:true}
          );
        }

        if(!selected){
          const regionName=
            result.feature?.properties?.name ||
            result.code ||
            '该地区';

          showToast(
            result.layer==='province'
              ? `已识别 ${regionName}，但该省级地区数据暂未开放`
              : `已识别 ${regionName}，但该国家的城市数据库暂未开放`
          );
        }
      }else if(result){
        if(result.fallbackFromProvince){
          // No province and no world country means the click landed in ocean.
          // Honour the world-level escape behaviour without leaving stale China
          // outlines, city locators or panel content behind.
          resetToIntro();
          showToast('已返回世界总览 · 点击位置未命中陆地区域');
        }else{
          showToast(
            `未识别到国家 · 点击坐标 ${result.lat.toFixed(1)}°, ${result.lng.toFixed(1)}°`
          );
        }
      }
    }

    dragging=false;
    pointerDownPos=null;
    activePointerId=null;
  }

  function distance(a,b){
    return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
  }

  function onTouchStart(e){
    if(e.touches.length===2){
      pinchDistance=distance(e.touches[0],e.touches[1]);
    }
  }

  function onTouchMove(e){
    if(e.touches.length===2){
      const d=distance(e.touches[0],e.touches[1]);
      const delta=d-pinchDistance;
      const nextZ=THREE.MathUtils.clamp(
        camera.position.z-delta*.006,
        2.9,
        6.2
      );

      const ratio=
        nextZ / Math.max(camera.position.z,1e-6);

      camera.position.multiplyScalar(ratio);

      // 因为相机位于北半球上方，缩放后重新对准球心。
      camera.lookAt(0,0,0);

      pinchDistance=d;
    }
  }

  canvas.addEventListener('pointerdown',onPointerDown);
  canvas.addEventListener('pointermove',onPointerMove);
  canvas.addEventListener('pointerup',onPointerUp);

  // Critical anti-"sticky mouse" safety net.
  canvas.addEventListener('pointerleave',forceReleaseDrag);
  canvas.addEventListener('pointercancel',forceReleaseDrag);
  window.addEventListener('pointerup',forceReleaseDrag);
  window.addEventListener('pointercancel',forceReleaseDrag);
  window.addEventListener('blur',forceReleaseDrag);

  canvas.addEventListener('touchstart',onTouchStart,{passive:true});
  canvas.addEventListener('touchmove',onTouchMove,{passive:true});

  // ResizeObserver
  function resizeToContainer(){
    // V10.5-I: the renderer is sized from the full World Stage, not from
    // the grid-constrained .ct-world column. Panel layout must never change
    // the physical WebGL viewport or camera aspect ratio.
    const rect=stage.getBoundingClientRect();
    const width=Math.max(1,Math.floor(rect.width));
    const height=Math.max(1,Math.floor(rect.height));

    camera.aspect=width/height;
    camera.updateProjectionMatrix();
    camera.lookAt(0,0,0);

    // V10.5-N: cap Retina rendering cost. Above 2x, GPU cost rises sharply
    // while visual gains are marginal for this full-screen 3D scene.
    const touchDevice=IS_TOUCH_DEVICE;
    const dprCap=touchDevice ? 2.2 : 3.0;
    const effectiveDpr=Math.min(window.devicePixelRatio || 1,dprCap);

    renderer.setPixelRatio(effectiveDpr);
    renderer.setSize(width,height,false);
    postComposer.setPixelRatio(effectiveDpr);
    postComposer.setSize(width,height);


    cameraManager.composer.refresh();
  }

  // V10.5-N: coalesce ResizeObserver bursts into one resize per animation frame.
  let resizePending=false;
  let resizeRaf=0;

  const scheduleResize=()=>{
    if(resizePending) return;
    resizePending=true;
    resizeRaf=requestAnimationFrame(()=>{
      resizePending=false;
      resizeRaf=0;
      resizeToContainer();
    });
  };

  const resizeObserver=new ResizeObserver(scheduleResize);
  resizeObserver.observe(stage);
  resizeToContainer();

  // Animation
  let disposed=false;
  let raf=0;
  let lastFrameTime=performance.now();

  function animate(now=performance.now()){
    if(disposed) return;
    raf=requestAnimationFrame(animate);

    const deltaSeconds=Math.min(
      .05,
      Math.max(0,(now-lastFrameTime)/1000)
    );
    lastFrameTime=now;

    // One authoritative RAF advances both systems. CameraManager owns the
    // navigation group; InteractionManager owns yaw/pitch child groups.
    cameraManager.tick(now,deltaSeconds);
    interactionManager.update(deltaSeconds);
    updateCityLocatorPulse(now);
    dynamicBackground.tick(deltaSeconds,now*.001);

    cloudOffsetY+=.00015;
    cloudOffsetX+=.00001;
    cloud.rotation.y=cloudOffsetY;
    cloud.rotation.x=cloudOffsetX;

    updateSolarLight(new Date());

    // One astronomical direction drives the physical Sun, visible Sun and night mask.

    // Fixed exposure: no zoom-dependent brightness pumping.
    postComposer.render(deltaSeconds);
  }

  // V10.4.9 initial state:
  // Earth + stars + clock only. No country or city data panels.
  {
    const initial=COUNTRY_DATA[initialCountry];
    const [lat,lng]=initial.center;

    globeGroup.quaternion.copy(
      getCountryTargetQuaternion(lat,lng)
    );

    initialQuaternion.copy(
      globeGroup.quaternion
    );
  }

  setStageState('intro');
  animate();

  loading.classList.add('hide');
  stage.classList.add('is-ready');

  function dispose(){
    if(disposed) return;
    disposed=true;
    cancelAnimationFrame(raf);
    if(resizeRaf) cancelAnimationFrame(resizeRaf);
    resizePending=false;
    clearInterval(localClockTimer);
    dynamicBackground.dispose();
    resizeObserver.disconnect();

    canvas.removeEventListener('pointerdown',onPointerDown);
    canvas.removeEventListener('pointermove',onPointerMove);
    canvas.removeEventListener('pointerup',onPointerUp);
    canvas.removeEventListener('pointerleave',forceReleaseDrag);
    canvas.removeEventListener('pointercancel',forceReleaseDrag);

    window.removeEventListener('pointerup',forceReleaseDrag);
    window.removeEventListener('pointercancel',forceReleaseDrag);
    window.removeEventListener('blur',forceReleaseDrag);

    canvas.removeEventListener('touchstart',onTouchStart);
    canvas.removeEventListener('touchmove',onTouchMove);

    disposeObject3D(scene);
    outputPass.dispose?.();
    postComposer.dispose?.();
    renderer.dispose();
    containerElement.innerHTML='';
  }

  return {
    element:stage,
    selectContinent,
    selectCountry,
    selectProvince,
    selectCity,
    resetToIntro,
    setRightPanelCollapsed,
    animateReturnToInitial,
    setMode,
    getMode:()=>modeState,
    getSelectedCountry:()=>selectedCountryCode,
    getSelectedProvince:()=>selectedProvinceId,
    getSelectedCity:()=>selectedCityId,
    dispose,
    renderer,
    scene,
    camera,
    earthTiltGroup,
    idleSpinGroup,
    globeGroup,
    earthGroup,
    earth,
    cloud,
    night,
    atmosphere
  };
}
