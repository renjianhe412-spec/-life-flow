function escapeHtmlAttribute(value){
  return String(value ?? '').replace(/[&<>"']/g,char=>({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  })[char]);
}

function resolveCityImageUrl(city){
  const candidate=typeof city?.imageUrl==='string'
    ? city.imageUrl.trim()
    : '';
  return candidate || DEFAULT_CITY_IMG;
}

function bindCityImageFallback(img){
  if(!img || img.dataset.cityFallbackBound==='1') return;
  img.dataset.cityFallbackBound='1';

  img.addEventListener('error',()=>{
    const failedUrl=img.currentSrc || img.getAttribute('src') || img.dataset.src || '';

    if(img.dataset.cityFallbackApplied==='1') return;
    img.dataset.cityFallbackApplied='1';
    img.classList.add('is-fallback');
    img.alt='城市图片暂不可用';
    img.removeAttribute('data-src');
    img.src=DEFAULT_CITY_IMG;

    console.warn('[Capital Track] City image failed; fallback applied:',failedUrl);
  });
}

function loadCityImage(img){
  if(!img) return;
  bindCityImageFallback(img);

  if(!img.hasAttribute('src')){
    const candidate=(img.dataset.src || '').trim();
    img.src=candidate || DEFAULT_CITY_IMG;
  }
}

function sortCities(cities){
  return [...cities].sort((a,b)=>{
    if(a.capital !== b.capital) return a.capital ? -1 : 1;
    return b.economicIndex - a.economicIndex;
  });
}

function latLngToVector3(lat,lng,r=1){
  const latRad = THREE.MathUtils.degToRad(lat);
  const lngRad = THREE.MathUtils.degToRad(lng);
  return new THREE.Vector3(
    r * Math.cos(latRad) * Math.cos(lngRad),
    r * Math.sin(latRad),
    -r * Math.cos(latRad) * Math.sin(lngRad)
  );
}

function vector3ToLatLng(v){
  const n = v.clone().normalize();
  return {
    lat: THREE.MathUtils.radToDeg(Math.asin(THREE.MathUtils.clamp(n.y,-1,1))),
    lng: THREE.MathUtils.radToDeg(Math.atan2(-n.z,n.x))
  };
}

function normalizeFeatureCode(feature){
  const p=feature?.properties || {};

  const rawCandidates=[
    feature?.id,
    p.iso_a3,
    p.ISO_A3,
    p.adm0_a3,
    p.ADM0_A3,
    p.sov_a3,
    p.SOV_A3
  ];

  for(const raw of rawCandidates){
    if(typeof raw!=='string') continue;

    const code=raw.trim().toUpperCase();

    if(code && code!=='-99'){
      return code;
    }
  }

  return null;
}

function ringToUnitVectors(ring){
  return (ring || []).map(([lng,lat])=>
    latLngToVector3(lat,lng,1).normalize()
  );
}

function prepareSphericalFeature(feature){
  const geometry=feature?.geometry;

  if(!geometry){
    return {
      feature,
      code:normalizeFeatureCode(feature),
      polygons:[],
      latMin:-90,
      latMax:90
    };
  }

  const polygons=[];

  function addPolygon(poly){
    if(!poly?.length) return;

    polygons.push({
      outer:ringToUnitVectors(poly[0]),
      holes:poly.slice(1).map(ringToUnitVectors)
    });
  }

  if(geometry.type==='Polygon'){
    addPolygon(geometry.coordinates);
  }else if(geometry.type==='MultiPolygon'){
    geometry.coordinates.forEach(addPolygon);
  }

  let latMin=90;
  let latMax=-90;

  const scanRing=ring=>{
    for(const coord of ring || []){
      const lat=coord[1];
      if(Number.isFinite(lat)){
        latMin=Math.min(latMin,lat);
        latMax=Math.max(latMax,lat);
      }
    }
  };

  if(geometry.type==='Polygon'){
    geometry.coordinates.forEach(scanRing);
  }else if(geometry.type==='MultiPolygon'){
    geometry.coordinates.forEach(poly=>poly.forEach(scanRing));
  }

  if(latMin>latMax){
    latMin=-90;
    latMax=90;
  }

  return {
    feature,
    code:normalizeFeatureCode(feature),
    polygons,
    latMin,
    latMax
  };
}

function sphericalRingContains(point,ringVectors){
  if(!ringVectors || ringVectors.length<3){
    return false;
  }

  const p=point.clone().normalize();
  let angleSum=0;

  for(let i=0;i<ringVectors.length;i++){
    const a=ringVectors[i];
    const b=ringVectors[(i+1)%ringVectors.length];

    const tangentA=a.clone()
      .addScaledVector(p,-p.dot(a));

    const tangentB=b.clone()
      .addScaledVector(p,-p.dot(b));

    const lenA=tangentA.length();
    const lenB=tangentB.length();

    // Click essentially on a boundary vertex.
    if(lenA<1e-8 || lenB<1e-8){
      return true;
    }

    tangentA.multiplyScalar(1/lenA);
    tangentB.multiplyScalar(1/lenB);

    const cross=tangentA.clone().cross(tangentB);

    const signedAngle=Math.atan2(
      p.dot(cross),
      THREE.MathUtils.clamp(
        tangentA.dot(tangentB),
        -1,
        1
      )
    );

    angleSum+=signedAngle;
  }

  return Math.abs(angleSum)>Math.PI;
}

function sphericalPolygonContains(point,polygon){
  if(!sphericalRingContains(point,polygon.outer)){
    return false;
  }

  for(const hole of polygon.holes){
    if(sphericalRingContains(point,hole)){
      return false;
    }
  }

  return true;
}

function preparedFeatureContains(prepared,point,lat){
  // Cheap latitude rejection before spherical winding calculation.
  if(lat<prepared.latMin-.2 || lat>prepared.latMax+.2){
    return false;
  }

  return prepared.polygons.some(
    polygon=>sphericalPolygonContains(point,polygon)
  );
}

function findCountryFeatureSpherical(preparedFeatures,localPoint){
  const {lat}=vector3ToLatLng(localPoint);

  const matches=[];

  for(const prepared of preparedFeatures){
    if(preparedFeatureContains(prepared,localPoint,lat)){
      matches.push(prepared);
    }
  }

  if(matches.length===0){
    return null;
  }

  if(matches.length===1){
    return matches[0];
  }

  // Rare border ambiguity:
  // Prefer a country that has active game data, then the nearest configured
  // country center. This prevents huge high-latitude polygons from stealing
  // a click from the intended nearby country.
  const activeMatches=matches.filter(
    item=>item.code && (COUNTRY_DATA[item.code] || CHINA_PROVINCE_DATA?.[item.code])
  );

  const pool=activeMatches.length ? activeMatches : matches;

  let best=pool[0];
  let bestScore=-Infinity;

  for(const item of pool){
    const data=COUNTRY_DATA[item.code] || CHINA_PROVINCE_DATA?.[item.code];

    if(!data){
      if(bestScore===-Infinity){
        best=item;
      }
      continue;
    }

    const [centerLat,centerLng]=data.center;
    const centerVector=latLngToVector3(
      centerLat,
      centerLng,
      1
    ).normalize();

    const score=centerVector.dot(localPoint);

    if(score>bestScore){
      bestScore=score;
      best=item;
    }
  }

  return best;
}

function createOutline(feature,radius=1.024){
  const group=new THREE.Group();
  const material=new THREE.LineBasicMaterial({
    color:0x74d8ff,
    transparent:true,
    opacity:.96,
    depthTest:false,
    depthWrite:false
  });

  const addRing=ring=>{
    if(!ring || ring.length<2) return;
    const points=ring.map(([lng,lat])=>latLngToVector3(lat,lng,radius));
    const geometry=new THREE.BufferGeometry().setFromPoints(points);
    const line=new THREE.Line(geometry,material.clone());
    line.renderOrder=13;
    group.add(line);
  };

  const g=feature.geometry;
  if(g.type==='Polygon'){
    g.coordinates.forEach(addRing);
  }else if(g.type==='MultiPolygon'){
    g.coordinates.forEach(poly=>poly.forEach(addRing));
  }
  return group;
}

function cleanGeoRing(ring){
  if(!ring || ring.length<3) return [];

  const result=[...ring];

  if(result.length>2){
    const first=result[0];
    const last=result[result.length-1];

    if(
      Math.abs(first[0]-last[0])<1e-8 &&
      Math.abs(first[1]-last[1])<1e-8
    ){
      result.pop();
    }
  }

  return result;
}

function unwrapGeoRing(ring,referenceLon){
  const cleaned=cleanGeoRing(ring);
  if(!cleaned.length) return [];

  let previous=
    Number.isFinite(referenceLon)
      ? referenceLon
      : cleaned[0][0];

  return cleaned.map(([lng,lat],index)=>{
    let x=lng;

    if(index===0 && Number.isFinite(referenceLon)){
      while(x-referenceLon>180) x-=360;
      while(x-referenceLon<-180) x+=360;
    }else{
      while(x-previous>180) x-=360;
      while(x-previous<-180) x+=360;
    }

    previous=x;

    return new THREE.Vector2(x,lat);
  });
}

function createCountryMaskTexture(
  feature,
  width=2048,
  height=1024
){
  const canvas=document.createElement('canvas');
  canvas.width=width;
  canvas.height=height;

  const ctx=canvas.getContext('2d');

  ctx.clearRect(0,0,width,height);
  ctx.fillStyle='rgba(68,136,255,.88)';

  function lonToX(lng){
    return ((lng+180)/360)*width;
  }

  function latToY(lat){
    return ((90-lat)/180)*height;
  }

  function unwrapRingForCanvas(ring){
    const cleaned=cleanGeoRing(ring);

    if(!cleaned.length){
      return [];
    }

    let previous=cleaned[0][0];

    return cleaned.map(([lng,lat],index)=>{
      let x=lng;

      if(index>0){
        while(x-previous>180) x-=360;
        while(x-previous<-180) x+=360;
      }

      previous=x;

      return [x,lat];
    });
  }

  function traceRing(ring,shiftX){
    const points=unwrapRingForCanvas(ring);

    if(points.length<3){
      return;
    }

    points.forEach(([lng,lat],index)=>{
      const x=lonToX(lng)+shiftX;
      const y=latToY(lat);

      if(index===0){
        ctx.moveTo(x,y);
      }else{
        ctx.lineTo(x,y);
      }
    });

    ctx.closePath();
  }

  function drawPolygon(poly){
    if(!poly?.length){
      return;
    }

    for(const shiftX of [-width,0,width]){
      ctx.beginPath();

      traceRing(poly[0],shiftX);

      for(let i=1;i<poly.length;i++){
        traceRing(poly[i],shiftX);
      }

      try{
        ctx.fill('evenodd');
      }catch{
        ctx.fill();
      }
    }
  }

  const geometry=feature?.geometry;

  if(geometry?.type==='Polygon'){
    drawPolygon(geometry.coordinates);
  }else if(geometry?.type==='MultiPolygon'){
    geometry.coordinates.forEach(drawPolygon);
  }

  const texture=new THREE.CanvasTexture(canvas);

  texture.colorSpace=THREE.SRGBColorSpace;
  texture.minFilter=THREE.LinearFilter;
  texture.magFilter=THREE.LinearFilter;
  texture.generateMipmaps=false;
  texture.needsUpdate=true;

  return texture;
}

// V10.5-N: city locator anchored to the globe surface.
// The marker appears before the city dolly begins, so players can first read
// where the city sits inside the selected country, then follow the zoom-in.
function createCityLocator(city){
  const coords=CITY_VIEW_COORDS[city?.id] || CHINA_CITY_VIEW_COORDS[city?.id];
  if(!coords) return null;

  const [lat,lng]=coords;
  const normal=latLngToVector3(lat,lng,1).normalize();
  const group=new THREE.Group();

  group.position.copy(normal.clone().multiplyScalar(1.034));
  group.quaternion.setFromUnitVectors(
    new THREE.Vector3(0,1,0),
    normal
  );

  const markerMaterial=new THREE.MeshBasicMaterial({
    color:0xffd45a,
    transparent:true,
    opacity:.98,
    depthTest:false,
    depthWrite:false
  });

  const glowMaterial=new THREE.MeshBasicMaterial({
    color:0xffeaa0,
    transparent:true,
    opacity:.26,
    depthTest:false,
    depthWrite:false,
    blending:THREE.AdditiveBlending
  });

  const stem=new THREE.Mesh(
    new THREE.CylinderGeometry(.0038,.0055,.065,10),
    markerMaterial.clone()
  );
  stem.position.y=.0325;

  const head=new THREE.Mesh(
    new THREE.SphereGeometry(.018,18,18),
    markerMaterial
  );
  head.position.y=.078;

  const glow=new THREE.Mesh(
    new THREE.SphereGeometry(.038,18,18),
    glowMaterial
  );
  glow.position.y=.078;

  const ringMaterial=new THREE.MeshBasicMaterial({
    color:0xffd45a,
    transparent:true,
    opacity:.72,
    depthTest:false,
    depthWrite:false,
    side:THREE.DoubleSide
  });

  const ring=new THREE.Mesh(
    new THREE.RingGeometry(.030,.036,48),
    ringMaterial
  );
  ring.rotation.x=-Math.PI/2;
  ring.position.y=.004;

  // Billboard label keeps the city identity readable at country scale.
  const labelCanvas=document.createElement('canvas');
  labelCanvas.width=384;
  labelCanvas.height=96;
  const ctx=labelCanvas.getContext('2d');
  ctx.clearRect(0,0,384,96);
  ctx.fillStyle='rgba(5,12,24,.78)';
  ctx.beginPath();
  ctx.roundRect(12,12,360,72,20);
  ctx.fill();
  ctx.strokeStyle='rgba(255,218,102,.72)';
  ctx.lineWidth=2;
  ctx.stroke();
  ctx.fillStyle='#fff5c7';
  ctx.font='600 34px -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(city.name || city.en || city.id,192,49);

  const labelTexture=new THREE.CanvasTexture(labelCanvas);
  labelTexture.colorSpace=THREE.SRGBColorSpace;
  const labelMaterial=new THREE.SpriteMaterial({
    map:labelTexture,
    transparent:true,
    depthTest:false,
    depthWrite:false
  });
  const label=new THREE.Sprite(labelMaterial);
  label.position.set(0,.145,0);
  label.scale.set(.30,.075,1);

  group.add(stem,head,glow,ring,label);
  group.userData.pulseRing=ring;
  group.userData.glow=glow;
  group.renderOrder=30;

  return group;
}

function disposeObject3D(object){
  if(!object) return;

  object.traverse(obj=>{
    obj.geometry?.dispose?.();

    if(obj.material){
      const mats=
        Array.isArray(obj.material)
          ? obj.material
          : [obj.material];

      mats.forEach(material=>{
        for(const key of [
          'map',
          'alphaMap',
          'normalMap',
          'roughnessMap',
          'metalnessMap'
        ]){
          const texture=material[key];

          if(texture?.isTexture){
            texture.dispose();
          }
        }

        material.dispose?.();
      });
    }
  });
}

  class DynamicBackground{

    }

    triggerMeteorShower(source='random'){
      if(this.isShowerActive) return false;

      this.isShowerActive=true;
      this.showerTimeLeft=4+Math.random()*2;
      this.showerCooldown=30;
      this.showerSpawnRate=26+Math.random()*10;

      console.info(
        source==='manual'
          ? '🌠 手动彩蛋：大片流星雨降临！'
          : '🌠 随机彩蛋：大片流星雨降临！'
      );
      return true;
    }

    initStars(){
      const starCount=3500;
      const positions=new Float32Array(starCount*3);
      const phases=new Float32Array(starCount);
      const speeds=new Float32Array(starCount);
      const sizes=new Float32Array(starCount);
      const colors=new Float32Array(starCount*3);

      const palette=[
        new THREE.Color(0xffffff),
        new THREE.Color(0xeaf6ff),
        new THREE.Color(0xbfdcff),
        new THREE.Color(0xd7e6f5),
        new THREE.Color(0xfff4df)
      ];

      for(let i=0;i<starCount;i++){
        const radius=30+Math.random()*50;
        const theta=Math.random()*Math.PI*2;
        const phi=Math.acos(2*Math.random()-1);
        const sinPhi=Math.sin(phi);

        positions[i*3]=radius*sinPhi*Math.cos(theta);
        positions[i*3+1]=radius*sinPhi*Math.sin(theta);
        positions[i*3+2]=radius*Math.cos(phi);

        phases[i]=Math.random()*Math.PI*2;
        speeds[i]=.55+Math.random()*1.55;

        const rare=Math.random();
        sizes[i]=rare<.025
          ? 3.2+Math.random()*1.6
          : rare<.18
            ? 2.0+Math.random()*1.0
            : 1.0+Math.random()*1.25;

        const base=palette[Math.floor(Math.random()*palette.length)];
        const intensity=rare<.025 ? 1.0 : .62+Math.random()*.34;
        colors[i*3]=Math.min(1,base.r*intensity);
        colors[i*3+1]=Math.min(1,base.g*intensity);
        colors[i*3+2]=Math.min(1,base.b*intensity);
      }

      const geometry=new THREE.BufferGeometry();
      geometry.setAttribute('position',new THREE.BufferAttribute(positions,3));
      geometry.setAttribute('aPhase',new THREE.BufferAttribute(phases,1));
      geometry.setAttribute('aSpeed',new THREE.BufferAttribute(speeds,1));
      geometry.setAttribute('aSize',new THREE.BufferAttribute(sizes,1));
      geometry.setAttribute('aColor',new THREE.BufferAttribute(colors,3));

      this.starMaterial=new THREE.ShaderMaterial({
        uniforms:{
          uTime:{value:0}
        },
        vertexShader:`
          precision highp float;
          attribute float aPhase;
          attribute float aSpeed;
          attribute float aSize;
          attribute vec3 aColor;
          uniform float uTime;
          varying float vTwinkle;
          varying vec3 vColor;

          void main(){
            vColor=aColor;
            vTwinkle=.58+.42*sin(uTime*aSpeed+aPhase);

            vec4 mvPosition=modelViewMatrix*vec4(position,1.0);
            float distanceScale=clamp(70.0/max(12.0,-mvPosition.z),.65,2.35);
            gl_PointSize=aSize*distanceScale;
            gl_Position=projectionMatrix*mvPosition;
          }
        `,
        fragmentShader:`
          precision highp float;
          varying float vTwinkle;
          varying vec3 vColor;

          void main(){
            vec2 p=gl_PointCoord-vec2(.5);
            float d=length(p);
            if(d>.5) discard;

            float core=smoothstep(.24,0.0,d);
            float halo=smoothstep(.5,.08,d)*.34;
            float alpha=(core+halo)*vTwinkle;
            vec3 color=vColor*(.82+vTwinkle*.28);

            gl_FragColor=vec4(color,alpha);
          }
        `,
        transparent:true,
        blending:THREE.AdditiveBlending,
        depthWrite:false,
        depthTest:true,
        toneMapped:false
      });

      this.starfield=new THREE.Points(geometry,this.starMaterial);
      this.starfield.renderOrder=-30;
      this.starfield.frustumCulled=false;
      this.scene.add(this.starfield);
    }

    chooseMeteorColor(){
      return 0xf0f8ff;
    }

    spawnMeteor(isEasterEgg=false){
      const activeCap=isEasterEgg ? this.showerActiveCap : this.normalMaxMeteors;
      if(this.meteors.length>=activeCap) return false;

      const length=isEasterEgg
        ? 6.5+Math.random()*6.5
        : 5.0+Math.random()*4.5;
      const width=isEasterEgg
        ? .042+Math.random()*.050
        : .045+Math.random()*.035;

      const geometry=new THREE.PlaneGeometry(width,length,1,1);
      geometry.translate(0,-length*.5,0);

      const material=new THREE.ShaderMaterial({
        uniforms:{
          uOpacity:{value:0},
          uColor:{value:new THREE.Color(this.chooseMeteorColor(isEasterEgg))}
        },
        vertexShader:`
          varying vec2 vUv;
          void main(){
            vUv=uv;
            gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
          }
        `,
        fragmentShader:`
          precision highp float;
          varying vec2 vUv;
          uniform float uOpacity;
          uniform vec3 uColor;
          void main(){
            float center=1.0-smoothstep(.0,.5,abs(vUv.x-.5));
            float tail=pow(clamp(vUv.y,0.0,1.0),1.55);
            float head=smoothstep(.72,1.0,vUv.y);
            float alpha=center*(tail*.66+head*.72)*uOpacity;
            gl_FragColor=vec4(uColor*(.75+head*.75),alpha);
          }
        `,
        transparent:true,
        blending:THREE.AdditiveBlending,
        depthWrite:false,
        depthTest:true,
        toneMapped:false,
        side:THREE.DoubleSide
      });

      const meteor=new THREE.Mesh(geometry,material);
      // Deep-space radiant geometry: upper-right spawn, safely behind the Earth depth layer.
      meteor.position.set(
        20+Math.random()*15,
        15+Math.random()*15,
        -30-Math.random()*20
      );

      const speedMultiplier=isEasterEgg
        ? 1.35+Math.random()*1.05
        : 1.0;

      // Parallel shower motion: all meteors travel left-downward and slightly toward camera.
      const velocity=new THREE.Vector3(
        -(9.0+Math.random()*4.5)*speedMultiplier,
        -(7.5+Math.random()*4.0)*speedMultiplier,
        (1.5+Math.random()*1.5)*speedMultiplier
      );

      meteor.rotation.z=Math.atan2(velocity.y,velocity.x)-Math.PI*.5;
      meteor.renderOrder=-20;
      meteor.userData.velocity=velocity;
      meteor.userData.age=0;

      // Keep the meteor alive until it has crossed the Earth and travelled beyond
      // the lower-left deep-space exit zone. This prevents the shower from
      // disappearing immediately after passing behind the globe.
      const lifeToExitX=(-45-meteor.position.x)/velocity.x;
      const lifeToExitY=(-35-meteor.position.y)/velocity.y;
      const travelLife=Math.min(lifeToExitX,lifeToExitY)+.85;
      meteor.userData.maxLife=THREE.MathUtils.clamp(travelLife,3.8,7.5);
      meteor.userData.isEasterEgg=isEasterEgg;

      this.meteorRoot.add(meteor);
      this.meteors.push(meteor);
      return true;
    }

    updateShowerState(dt){
      if(this.showerCooldown>0){
        this.showerCooldown=Math.max(0,this.showerCooldown-dt);
      }

      if(!this.isShowerActive && this.showerCooldown<=0){
        const triggerProbability=1-Math.exp(-this.randomShowerRatePerSecond*dt);
        if(Math.random()<triggerProbability){
          this.triggerMeteorShower('random');
        }
      }

      if(!this.isShowerActive) return;

      this.showerTimeLeft-=dt;
      this.showerSpawnAccumulator+=this.showerSpawnRate*dt;

      while(this.showerSpawnAccumulator>=1){
        if(!this.spawnMeteor(true)) break;
        this.showerSpawnAccumulator-=1;
      }

      if(this.showerTimeLeft<=0){
        this.isShowerActive=false;
        this.showerTimeLeft=0;
        this.showerSpawnAccumulator=0;
      }
    }

    tick(dt,elapsedTime){
      if(this.starMaterial){
        this.starMaterial.uniforms.uTime.value=elapsedTime;
      }

      this.updateShowerState(dt);

      if(!this.isShowerActive){
        const spawnProbability=1-Math.exp(-this.spawnRatePerSecond*dt);
        if(Math.random()<spawnProbability){
          this.spawnMeteor(false);
        }
      }

      for(let i=this.meteors.length-1;i>=0;i--){
        const meteor=this.meteors[i];
        meteor.userData.age+=dt;
        meteor.position.addScaledVector(meteor.userData.velocity,dt);

        const t=meteor.userData.age/meteor.userData.maxLife;
        const fadeIn=smoothstep01(t/.08);
        const fadeOut=1-smoothstep01((t-.84)/.16);
        const showerBoost=meteor.userData.isEasterEgg ? 1.08 : 1.0;
        meteor.material.uniforms.uOpacity.value=Math.max(0,fadeIn*fadeOut*showerBoost);

        if(t>=1){
          this.removeMeteor(i);
        }
      }
    }

    removeMeteor(index){
      const meteor=this.meteors[index];
      if(!meteor) return;
      this.meteorRoot.remove(meteor);
      meteor.geometry?.dispose?.();
      meteor.material?.dispose?.();
      this.meteors.splice(index,1);
    }

    dispose(){
      for(let i=this.meteors.length-1;i>=0;i--){
        this.removeMeteor(i);
      }

      if(this.starfield){
        this.scene.remove(this.starfield);
        this.starfield.geometry?.dispose?.();
        this.starfield.material?.dispose?.();
      }

      if(window.triggerMeteorShower===this._manualTrigger){
        delete window.triggerMeteorShower;
      }

      this.camera.remove(this.meteorRoot);
      this.meteorRoot.clear();
    }
  }

  function createRadialGlowTexture(){
    const canvas=document.createElement('canvas');
    canvas.width=256;
    canvas.height=256;

    const ctx=canvas.getContext('2d');

    const gradient=ctx.createRadialGradient(
      128,128,4,
      128,128,128
    );

    gradient.addColorStop(0.00,'rgba(255,255,240,1.0)');
    gradient.addColorStop(0.12,'rgba(255,244,190,.92)');
    gradient.addColorStop(0.34,'rgba(255,194,92,.35)');
    gradient.addColorStop(0.68,'rgba(255,142,44,.08)');
    gradient.addColorStop(1.00,'rgba(255,120,20,0.0)');

    ctx.fillStyle=gradient;
    ctx.fillRect(0,0,256,256);

    const texture=new THREE.CanvasTexture(canvas);
    texture.colorSpace=THREE.SRGBColorSpace;
    texture.needsUpdate=true;

    return texture;
  }

  function createDetailNoiseTexture(){
    const size=256;
    const canvas=document.createElement('canvas');
    canvas.width=size;
    canvas.height=size;
    const ctx=canvas.getContext('2d');
    const image=ctx.createImageData(size,size);
    for(let y=0;y<size;y++){
      for(let x=0;x<size;x++){
        const i=(y*size+x)*4;
        const v=Math.min(255,Math.max(0,((Math.random()*0.55)+(Math.random()*0.30)+0.15)*255));
        image.data[i]=image.data[i+1]=image.data[i+2]=v;
        image.data[i+3]=255;
      }
    }
    ctx.putImageData(image,0,0);
    const texture=new THREE.CanvasTexture(canvas);
    texture.wrapS=THREE.RepeatWrapping;
    texture.wrapT=THREE.RepeatWrapping;
    texture.repeat.set(20,10);
    texture.colorSpace=THREE.NoColorSpace;
    texture.needsUpdate=true;
    return texture;
  }

  function createInvertedTexture(sourceTexture){
    if(!sourceTexture || !sourceTexture.image) return null;
    const image=sourceTexture.image;
    const width=image.naturalWidth || image.videoWidth || image.width;
    const height=image.naturalHeight || image.videoHeight || image.height;
    if(!width || !height) return null;

    const canvas=document.createElement('canvas');
    canvas.width=width;
    canvas.height=height;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(image,0,0,width,height);
    const imageData=ctx.getImageData(0,0,width,height);
    const data=imageData.data;
    for(let i=0;i<data.length;i+=4){
      const lum=(data[i]+data[i+1]+data[i+2])/3;
      const inv=255-lum;
      data[i]=data[i+1]=data[i+2]=inv;
      data[i+3]=255;
    }
    ctx.putImageData(imageData,0,0);
    const texture=new THREE.CanvasTexture(canvas);
    texture.wrapS=THREE.RepeatWrapping;
    texture.wrapT=THREE.RepeatWrapping;
    texture.colorSpace=THREE.NoColorSpace;
    texture.needsUpdate=true;
    return texture;
  }

  function getUTCYearDay(date){
    const start=Date.UTC(date.getUTCFullYear(),0,0);
    const now=Date.UTC(date.getUTCFullYear(),date.getUTCMonth(),date.getUTCDate());
    return Math.floor((now-start)/86400000);
  }

  function getSubsolarPoint(date){
    const dayOfYear=getUTCYearDay(date);
    const utcHours=
      date.getUTCHours()+
      date.getUTCMinutes()/60+
      date.getUTCSeconds()/3600+
      date.getUTCMilliseconds()/3600000;

    const declination=23.44*Math.sin((2*Math.PI/365.24)*(dayOfYear-81));
    let lng=180-(utcHours*15);
    while(lng>180) lng-=360;
    while(lng<-180) lng+=360;

    return {lat:declination,lng};
  }

  const _solarWorldQuaternion=new THREE.Quaternion();
  const _solarLocalDirection=new THREE.Vector3();
  const _solarWorldDirection=new THREE.Vector3();

  function updateSolarLight(date=new Date()){
    const subsolar=getSubsolarPoint(date);

    // Convert the real-time subsolar latitude/longitude into the globe's
    // local coordinate system, then follow the globe's current world rotation.
    _solarLocalDirection.copy(
      latLngToVector3(
        subsolar.lat,
        subsolar.lng,
        1
      )
    ).normalize();

    earthGroup.getWorldQuaternion(
      _solarWorldQuaternion
    );

    _solarWorldDirection.copy(
      _solarLocalDirection
    )
    .applyQuaternion(
      _solarWorldQuaternion
    )
    .normalize();

    sunDirectionWorld.copy(
      _solarWorldDirection
    );

    // DirectionalLight points from its position toward the origin.
    sun.position.copy(
      _solarWorldDirection
    ).multiplyScalar(7);
    sun.target.position.set(0,0,0);
    sun.updateMatrixWorld();
    sun.target.updateMatrixWorld();

    sunVisual.position.copy(
      sun.position
    );

    if(nightMaterial?.uniforms?.sunPosition){
      nightMaterial.uniforms.sunPosition.value
        .copy(_solarWorldDirection);
    }

    if(atmosphereRimMaterial?.uniforms?.sunPosition){
      atmosphereRimMaterial.uniforms.sunPosition.value
        .copy(_solarWorldDirection);

    if(atmosphereGlowMaterial?.uniforms?.sunPosition){
      atmosphereGlowMaterial.uniforms.sunPosition.value

    }
  }

  /* ============================================================
     V10.5-I InteractionManager
     - Yaw: unlimited, retains position and carries light inertia.
     - Pitch: clamped to +/-23.5 degrees and springs back to 0 after release.
     - Programmatic navigation owns globeGroup only; user interaction owns
       yawGroup/pitchGroup only.
     ============================================================ */
  class InteractionManager{
    constructor(navigationGroup,yawGroup,pitchGroup){
      this.navigationGroup=navigationGroup;
      this.yawGroup=yawGroup;
      this.pitchGroup=pitchGroup;

      this.yaw=0;
      this.pitch=0;
      this.maxPitch=THREE.MathUtils.degToRad(23.5);

      this.yawVelocity=0;
      this.isDragging=false;
      this.enabled=true;

      this.yawSensitivity=.0048;
      this.pitchSensitivity=.0035;
      this.pitchReturnRate=6.0;
      this.yawDampingRate=5.2;
    }

    beginDrag(){
      if(!this.enabled) return false;
      this.isDragging=true;
      return true;
    }

    handleDrag(deltaX,deltaY){
      if(!this.enabled || !this.isDragging) return;

      const yawDelta=deltaX*this.yawSensitivity;
      const pitchDelta=-deltaY*this.pitchSensitivity;

      this.yaw+=yawDelta;
      this.pitch=THREE.MathUtils.clamp(
        this.pitch+pitchDelta,
        -this.maxPitch,
        this.maxPitch
      );

      // Store angular velocity for a short, damped horizontal coast.
      this.yawVelocity=yawDelta*60;
      this._apply();
    }

    endDrag(){
      this.isDragging=false;
    }

    update(deltaSeconds){
      if(!this.enabled) return;

      const dt=THREE.MathUtils.clamp(deltaSeconds,0,0.05);

      if(!this.isDragging){
        // Horizontal yaw keeps its heading and receives a light inertial coast.
        if(Math.abs(this.yawVelocity)>1e-5){
          this.yaw+=this.yawVelocity*dt;
          this.yawVelocity*=Math.exp(-this.yawDampingRate*dt);

          if(Math.abs(this.yawVelocity)<1e-4){
            this.yawVelocity=0;
          }
        }

        // Vertical pitch always returns smoothly to the neutral 0 degree pose.
        const returnFactor=1-Math.exp(-this.pitchReturnRate*dt);
        this.pitch=THREE.MathUtils.lerp(this.pitch,0,returnFactor);

        if(Math.abs(this.pitch)<1e-5){
          this.pitch=0;
        }
      }

      this._apply();
    }

    setEnabled(enabled){
      this.enabled=Boolean(enabled);
      if(!this.enabled){
        this.isDragging=false;
        this.yawVelocity=0;
      }
    }

    // Preserve the exact visible globe orientation before an automatic fly-to:
    // Navigation * Yaw * Pitch is folded into Navigation, then interaction
    // groups return to identity without a visible jump.
    absorbIntoNavigation(){
      const composed=this.navigationGroup.quaternion.clone()
        .multiply(this.yawGroup.quaternion)
        .multiply(this.pitchGroup.quaternion)
        .normalize();

      this.navigationGroup.quaternion.copy(composed);

      this.yaw=0;
      this.pitch=0;
      this.yawVelocity=0;
      this.isDragging=false;

      this.yawGroup.quaternion.identity();
      this.pitchGroup.quaternion.identity();
      this.yawGroup.rotation.set(0,0,0);
      this.pitchGroup.rotation.set(0,0,0);
    }

    reset(){
      this.yaw=0;
      this.pitch=0;
      this.yawVelocity=0;
      this.isDragging=false;
      this.yawGroup.rotation.set(0,0,0);
      this.pitchGroup.rotation.set(0,0,0);
    }

    _apply(){
      // Final defensive clamp: even malformed pointer deltas or restored state
      // can never push the custom pitch controller beyond its polar guard.
      this.pitch=THREE.MathUtils.clamp(
        Number.isFinite(this.pitch) ? this.pitch : 0,
        -this.maxPitch,
        this.maxPitch
      );

      // Keep yaw numerically bounded while remaining visually unlimited.
      if(Math.abs(this.yaw)>Math.PI*4){
        this.yaw=THREE.MathUtils.euclideanModulo(
          this.yaw+Math.PI,
          Math.PI*2
        )-Math.PI;
      }

      this.yawGroup.rotation.set(0,this.yaw,0);
      this.pitchGroup.rotation.set(this.pitch,0,0);
    }
  }

  function configureTexture(tex,colorSpace){
    tex.colorSpace=colorSpace;
    tex.minFilter=THREE.LinearMipmapLinearFilter;
    tex.magFilter=THREE.LinearFilter;
    tex.generateMipmaps=true;
    tex.anisotropy=renderer.capabilities.getMaxAnisotropy();
    tex.needsUpdate=true;
    return tex;

  function loadManaged(name,url,colorSpace){
    return new Promise((resolve,reject)=>{
      textureLoader.load(
        url,
        tex=>{
          assets[name]=configureTexture(tex,colorSpace);
          resolve(assets[name]);
        },
        undefined,
        ()=>reject(new Error(`${name} 贴图加载失败`))
      );
    });
  }


  function loadOptional(name,url,colorSpace,fallbackValue=null){
    return loadManaged(name,url,colorSpace).catch(error=>{

    });

  async function loadGeoJSON(url,label,{silent=false}={}){
    const controller=new AbortController();
    const timeoutId=setTimeout(()=>controller.abort(),8000);

    try{
      const response=await fetch(url,{
        cache:'force-cache',
        signal:controller.signal
      });

      if(!response.ok){
        throw new Error(`${label} GeoJSON ${response.status}`);
      }

      return await response.json();
    }catch(error){
      console.warn(`${label} geometry failed`,error);
      if(!silent){
        showToast('世界地理数据加载失败：地球仍可旋转');
      }
      return {type:'FeatureCollection',features:[]};
    }finally{

  // V10.6-A13 — China drilldown uses two independent visual layers:

  // two close radii to create a stable bright-core / soft-glow treatment.
  const chinaMacroOutlineGroup=new THREE.Group();
  chinaMacroOutlineGroup.name='ChinaMacroOutline';
  chinaMacroOutlineGroup.visible=false;

  const chinaMacroFeature=featureByCode.get('CHN');
  if(chinaMacroFeature){
    const macroGlow=createOutline(chinaMacroFeature,1.0272);
    macroGlow.traverse(obj=>{
      if(obj.material){
        obj.material.color.setHex(0x2f8dff);
        obj.material.opacity=.24;
        obj.material.blending=THREE.AdditiveBlending;
        obj.material.depthTest=true;
        obj.material.depthWrite=false;
        obj.renderOrder=12;
      }
    });

    const macroCore=createOutline(chinaMacroFeature,1.0262);
    macroCore.traverse(obj=>{
      if(obj.material){
        obj.material.color.setHex(0x4a9aff);
        obj.material.opacity=.92;
        obj.material.depthTest=true;
        obj.material.depthWrite=false;
        obj.renderOrder=14;
      }
    });

    chinaMacroOutlineGroup.add(macroGlow,macroCore);
  }
  earthGroup.add(chinaMacroOutlineGroup);

  const chinaProvinceBoundaryGroup=new THREE.Group();
  chinaProvinceBoundaryGroup.name='ChinaProvinceBoundaries';
  chinaProvinceBoundaryGroup.visible=false;

  for(const prepared of preparedProvinceFeatures){
    const outline=createOutline(prepared.feature,1.0244);
    outline.traverse(obj=>{

  const sunDirectionWorld=new THREE.Vector3(1,0,0);

  // V10.6-A20 — native day texture with zero artificial night-side emission.
  // The terminator is driven only by the real astronomical Sun. Night detail
  // comes from the independent city-light layer, never from the day texture.
  const earthMaterial=new THREE.MeshStandardMaterial({
    map:dayMap,
    normalMap:normalMap || null,
    normalScale:normalMap
      ? new THREE.Vector2(.20,.20)
      : new THREE.Vector2(0,0),
    roughness:.70,
    metalness:0.0,
    emissive:new THREE.Color(0x000000),
    emissiveIntensity:0,
    color:0xffffff,
    side:THREE.FrontSide
  });

  // V10.6-A22 — light-touch ocean lift for Apple-style airy seas.
  // Only very dark blue ocean pixels are lifted toward a soft azure floor.
  // Land colors and the overall physical lighting pipeline remain untouched.
  earthMaterial.onBeforeCompile=shader=>{
    shader.fragmentShader=shader.fragmentShader.replace(
      '#include <map_fragment>',
      `#ifdef USE_MAP
        vec4 sampledDiffuseColor=texture2D(map,vMapUv);
        vec3 c=sampledDiffuseColor.rgb;

        float isOcean=step(c.r,0.15)*step(c.g,0.25);
        vec3 appleAzure=vec3(0.18,0.38,0.65);
        c=mix(c,max(c,appleAzure),isOcean*0.85);

        sampledDiffuseColor.rgb=c;
        diffuseColor*=sampledDiffuseColor;
      #endif`
    );
  };

  const earth=new THREE.Mesh(
    new THREE.SphereGeometry(1,EARTH_SEGMENTS,EARTH_SEGMENTS),
    earthMaterial
  );
  earth.castShadow=false;
  earth.receiveShadow=false;
  earth.renderOrder=0;
  earthGroup.add(earth);

  // Data grid remains removed for a clean physical Earth surface.

  // Layer 5
  const nightMaterial=new THREE.ShaderMaterial({
    uniforms:{
      nightTexture:{value:nightMap},
      sunPosition:{value:sunDirectionWorld.clone()},
      nightExposure:{value:1.62},
      bloomBoost:{value:1.10}
    },
    vertexShader:`
      varying vec2 vUv;
      varying vec3 vWorldNormal;
      varying vec3 vViewDir;
      void main(){
        vUv=uv;
        vec3 worldPosition=(modelMatrix*vec4(position,1.0)).xyz;
        vWorldNormal=normalize(mat3(modelMatrix)*normal);
        vViewDir=normalize(cameraPosition-worldPosition);
        gl_Position=projectionMatrix*viewMatrix*vec4(worldPosition,1.0);
      }
    `,
    fragmentShader:`
      precision highp float;
      varying vec2 vUv;
      varying vec3 vWorldNormal;
      varying vec3 vViewDir;
      uniform sampler2D nightTexture;
      uniform vec3 sunPosition;
      uniform float nightExposure;
      uniform float bloomBoost;
      void main(){
        vec3 n=normalize(vWorldNormal);
        float sunLight=dot(n,normalize(sunPosition));
        float nightMask=1.0-smoothstep(-.05,.05,sunLight);

        vec3 tex=texture2D(nightTexture,vUv).rgb;
        float lum=max(max(tex.r,tex.g),tex.b);
        float core=smoothstep(.045,.58,lum);
        float soft=smoothstep(.012,.22,lum)*.34;

        // Natural city-light palette: mostly warm, with restrained cool LED contribution.
        vec3 warm=tex*vec3(1.20,1.10,.90);
        vec3 cool=tex.bgr*vec3(.20,.40,.60);
        vec3 cityColor=(warm+cool*.18)*nightExposure;

        float grazing=pow(1.0-max(dot(n,normalize(vViewDir)),0.0),2.2);
        float horizonBoost=1.0+grazing*.22;
        float alpha=(core+soft)*nightMask*.93;

        vec3 hdrCity=cityColor*nightMask*horizonBoost;
        hdrCity*=mix(1.0,bloomBoost,core);
        gl_FragColor=vec4(hdrCity,alpha);
      }
    `,
    transparent:true,
    blending:THREE.AdditiveBlending,
    depthWrite:false,
    depthTest:true,
    toneMapped:false
  });

  const night=new THREE.Mesh(
    new THREE.SphereGeometry(1.002,EARTH_SEGMENTS,EARTH_SEGMENTS),

  );

  earthGroup.add(night);

      varying vec3 vPositionNormal;

          tabindex="0"

          <div class="ct-city-compact-head">

              ${city.capital?`<span class="ct-capital">${capitalLabel}</span>`:''}
            </div>
            <span class="ct-city-expand-mark" aria-hidden="true">⌄</span>
          </div>

          <div class="city-details">
            <div class="ct-city-details-inner">
              <div class="ct-city-expanded-hero">
                <img
                  class="city-image"
                  data-src="${escapeHtmlAttribute(resolveCityImageUrl(city))}"
                  alt="${city.name} 城市实景"
                  loading="lazy"
                  referrerpolicy="no-referrer"
                >
                <div class="ct-city-expanded-copy">
                  <span class="ct-city-en">${city.en}</span>
                  <span class="ct-index">经济 ${city.economicIndex}</span>
                </div>
              </div>

              <div class="ct-role">${city.role}</div>
              <div class="ct-industry-row">
                ${city.industries.slice(0,4).map(x=>`<span class="ct-industry">${x}</span>`).join('')}
              </div>
              <div class="ct-detail-grid city-inline-stats">
                <div class="ct-mini-stat"><b>${city.talent}</b><span>人才</span></div>
                <div class="ct-mini-stat"><b>${city.opportunity}</b><span>机会</span></div>
                <div class="ct-mini-stat"><b>${city.cost}</b><span>成本</span></div>
              </div>
              <ul class="ct-adv-list city-inline-advantages">
                ${city.advantages.map(x=>`<li>${x}</li>`).join('')}
              </ul>
            </div>
          </div>
        </article>
      `;
    }).join('');

    cityList.querySelectorAll('.city-image').forEach(img=>{
      bindCityImageFallback(img);
      if(img.closest('.ct-city-card')?.classList.contains('expanded')){
        loadCityImage(img);
      }
    });

    cityList.querySelectorAll('.ct-city-card').forEach(card=>{
      const activateCity=()=>{
        const img=card.querySelector('.city-image');
        loadCityImage(img);
        const cityId=card.dataset.city;
        if(selectedCityFocused && selectedCityId===cityId){
          exitCityToParent({fly:true,restorePanel:true});
          return;
        }
        selectCity(cityId);
      };

      card.addEventListener('click',activateCity);
      card.addEventListener('keydown',event=>{
        if(event.key==='Enter' || event.key===' '){
          event.preventDefault();
          activateCity();
        }
      });
    });
  }

  function updateTabs(code){
    tabs.querySelectorAll('.ct-tab').forEach(btn=>{
      btn.classList.toggle('active',btn.dataset.code===code);
    });
  }

  function clearCityLocator(){
    if(!selectedCityMarker) return;
    earthGroup.remove(selectedCityMarker);
    disposeObject3D(selectedCityMarker);
    selectedCityMarker=null;
  }

  function showCityLocator(city){
    clearCityLocator();
    selectedCityMarker=createCityLocator(city);
    if(selectedCityMarker){
      earthGroup.add(selectedCityMarker);
    }
  }

  function updateCityLocatorPulse(now){
    if(!selectedCityMarker) return;

    const phase=(now%1500)/1500;
    const ring=selectedCityMarker.userData.pulseRing;
    const glow=selectedCityMarker.userData.glow;

    if(ring){
      const scale=.72+phase*1.65;
      ring.scale.setScalar(scale);
      ring.material.opacity=(1-phase)*.66;
    }

    if(glow){
      glow.material.opacity=.18+.12*Math.sin(now*.0065)*.5+.06;
    }
  }

  function clearCountryHighlight(){
    clearCityLocator();

    if(selectedOutline){
      earthGroup.remove(selectedOutline);
      disposeObject3D(selectedOutline);
      selectedOutline=null;
    }

    if(selectedFill){
      earthGroup.remove(selectedFill);
      disposeObject3D(selectedFill);
      selectedFill=null;
    }

    if(selectedBeacon){
      earthGroup.remove(selectedBeacon);
      disposeObject3D(selectedBeacon);
      selectedBeacon=null;
    }
  }

  function updateOutline(code){
    clearCountryHighlight();

    const feature=
      featureByCode.get(code) ||
      provinceFeatureByCode.get(code);

    if(feature){
      selectedFill=createCountryFill(
        feature,
        1.0228
      );

      selectedOutline=createOutline(
        feature,
        1.025
      );

      // China keeps its own persistent macro border while provinces are active.
      // The selected CHN outline therefore stays restrained to avoid stacking
      // three equally bright copies of the same national boundary.
      if(code==='CHN'){
        if(selectedFill?.material){
          selectedFill.material.opacity=.12;
        }
        selectedOutline.traverse(obj=>{
          if(obj.material){
            obj.material.color.setHex(0x4a9aff);
            obj.material.opacity=.42;
          }
        });
      }

      earthGroup.add(selectedFill);
      earthGroup.add(selectedOutline);
    }

    // Tiny-country visibility safeguard.
    selectedBeacon=COUNTRY_DATA[code]
      ? createCountryBeacon(code)
      : null;

    if(selectedBeacon){
      earthGroup.add(selectedBeacon);
    }
  }

  function setCountryHighlightStrength(level='strong'){
    const weak=level==='weak';

    if(selectedFill?.material){
      selectedFill.material.opacity=weak?.10:.25;
    }

    selectedOutline?.traverse?.(obj=>{
      if(obj.material){
        obj.material.opacity=weak?.34:.96;
      }
    });

    selectedBeacon?.traverse?.(obj=>{
      if(obj.material){
        const isGlow=obj.geometry?.parameters?.radius>.02;
        obj.material.opacity=weak
          ? (isGlow?.10:.42)
          : (isGlow?.28:.95);
      }
    });
  }

  let flyAnimation=null;
  let cameraTransitionActive=false;

  function getCountryTargetQuaternion(lat,lng,framingCameraPosition=null){
    // Local surface normal of the selected country.
    // Keep the SAME lat/lng convention used by GeoJSON outlines and hit-testing.
    const normalLocal=latLngToVector3(lat,lng,1).normalize();

    const latRad=THREE.MathUtils.degToRad(lat);
    const lngRad=THREE.MathUtils.degToRad(lng);

    // Tangent direction toward geographic north in the engine's
    // existing coordinate convention:
    // x = cos(lat)cos(lng)
    // y = sin(lat)
    // z = -cos(lat)sin(lng)
    const northLocal=new THREE.Vector3(
      -Math.sin(latRad)*Math.cos(lngRad),
       Math.cos(latRad),
       Math.sin(latRad)*Math.sin(lngRad)
    ).normalize();

    const eastLocal=northLocal.clone()
      .cross(normalLocal)
      .normalize();

    // Front direction from globe center toward the framing camera position.
    // City zoom uses the FINAL camera position, not the pre-zoom camera position,
    // so the selected city is still centered after the dolly-in completes.
    const framePosition=(framingCameraPosition || camera.position).clone();
    const frontWorld=framePosition.clone().normalize();

    let framingCameraQuaternion=camera.quaternion.clone();
    if(framingCameraPosition){
      const lookMatrix=new THREE.Matrix4().lookAt(
        framePosition,
        new THREE.Vector3(0,0,0),
        new THREE.Vector3(0,1,0)
      );
      framingCameraQuaternion=new THREE.Quaternion()
        .setFromRotationMatrix(lookMatrix)
        .normalize();
    }

    // Screen-up projected onto the tangent plane at the front of the globe.
    const screenUp=new THREE.Vector3(0,1,0)
      .applyQuaternion(framingCameraQuaternion)
      .normalize();

    const northWorld=screenUp.clone()
      .sub(
        frontWorld.clone().multiplyScalar(
          screenUp.dot(frontWorld)
        )
      )
      .normalize();

    const eastWorld=northWorld.clone()
      .cross(frontWorld)
      .normalize();

    const localBasis=new THREE.Matrix4().makeBasis(
      eastLocal,
      northLocal,
      normalLocal
    );

    const worldBasis=new THREE.Matrix4().makeBasis(
      eastWorld,
      northWorld,
      frontWorld
    );

    const localQ=new THREE.Quaternion()
      .setFromRotationMatrix(localBasis);

    const worldQ=new THREE.Quaternion()
      .setFromRotationMatrix(worldBasis);

    const desiredWorld=worldQ
      .multiply(localQ.invert())
      .normalize();

    return earthTiltGroup.quaternion
      .clone()
      .invert()
      .multiply(desiredWorld)
      .multiply(
        earthGroup.quaternion.clone().invert()
      )
      .normalize();
  }

  function getCountryFrontScore(code){
    const c=COUNTRY_DATA[code];
    if(!c) return -1;

    const [lat,lng]=c.center;

    const earthWorldQ=new THREE.Quaternion();
    earthGroup.getWorldQuaternion(earthWorldQ);

    const selectedNormal=latLngToVector3(lat,lng,1)
      .applyQuaternion(earthWorldQ)
      .normalize();

    const frontWorld=camera.position.clone().normalize();

    return selectedNormal.dot(frontWorld);
  }

  function forceCountryToFront(code){
    const c=COUNTRY_DATA[code];
    if(!c) return;

    const [lat,lng]=c.center;

    // 不再使用单纯 setFromUnitVectors 做“只对准点、不管上下”的修正，
    // 因为它可能让国家居中但整颗地球倒置。
    globeGroup.quaternion.copy(
      getCountryTargetQuaternion(lat,lng)
    );
  }

  /* ============================================================
     V10.5-B Camera Core: View Resolver + Transition Engine
     ============================================================ */
  class ViewportComposer{
    constructor(camera,renderer){
      this.camera=camera;
      this.renderer=renderer;
      this.currentCompositionX=.5;
      this.currentCompositionY=.5;
    }

    apply(normalizedX,normalizedY=.5){
      this.currentCompositionX=normalizedX;
      this.currentCompositionY=normalizedY;

      const size=new THREE.Vector2();
      this.renderer.getSize(size);

      const width=Math.max(1,size.x);
      const height=Math.max(1,size.y);
      const offsetX=(.5-normalizedX)*width;
      const offsetY=(.5-normalizedY)*height;

      this.camera.setViewOffset(
        width,
        height,
        offsetX,
        offsetY,
        width,
        height
      );

      this.camera.updateProjectionMatrix();
    }

    refresh(){
      this.apply(
        this.currentCompositionX,
        this.currentCompositionY
      );
    }

    clear(){
      this.currentCompositionX=.5;
      this.currentCompositionY=.5;
      this.camera.clearViewOffset();
      this.camera.updateProjectionMatrix();
    }
  }

  function getCountryViewDistance(code,device='desktop'){
    let distance=COUNTRY_VIEW_DISTANCE[code];

    if(!Number.isFinite(distance)){
      const country=COUNTRY_DATA[code];
      const feature=featureByCode.get(code);

      if(country && feature?.geometry?.coordinates){
        const center=latLngToVector3(
          country.center[0],
          country.center[1],
          1
        ).normalize();

        const angles=[];
        const walk=node=>{
          if(
            Array.isArray(node) &&
            node.length>=2 &&
            typeof node[0]==='number' &&
            typeof node[1]==='number'
          ){
            const v=latLngToVector3(node[1],node[0],1).normalize();
            const dot=THREE.MathUtils.clamp(center.dot(v),-1,1);
            angles.push(THREE.MathUtils.radToDeg(Math.acos(dot)));
            return;
          }

          if(Array.isArray(node)){
            node.forEach(walk);
          }
        };

        walk(feature.geometry.coordinates);
        angles.sort((a,b)=>a-b);

        const radiusDeg=angles.length
          ? angles[Math.min(angles.length-1,Math.floor(angles.length*.90))]
          : 12;

        distance=THREE.MathUtils.clamp(
          2.28+radiusDeg*.032,
          2.30,
          3.80
        );
      }else{
        distance=3.0;
      }
    }

    return device==='tablet'
      ? Math.min(3.95,distance+.14)
      : distance;
  }

  class CameraManager{
    constructor(camera,renderer,globeGroup,idleSpinGroup){
      this.camera=camera;
      this.globeGroup=globeGroup;
      this.idleSpinGroup=idleSpinGroup;
      this.composer=new ViewportComposer(camera,renderer);

      // V10.5-E: transitions are advanced by the authoritative render loop.
      // GSAP is no longer the clock for camera motion.
      this.activeTransition=null;
      this.currentIntentKey=null;
      this.transitionSerial=0;

      // V10.6-A7 attract mode. CameraManager remains the sole owner of the
      // programmatic navigation group, including WORLD-level idle rotation.
      this.idleSpinSpeed=THREE.MathUtils.degToRad(.82);
    }

    absorbIdleSpinIntoNavigation(){
      const spinQ=this.idleSpinGroup.quaternion;
      const hasSpin=Math.abs(spinQ.x)+Math.abs(spinQ.y)+Math.abs(spinQ.z)>1e-8;
      if(!hasSpin) return;

      // Preserve the visible pose while returning the dedicated axial spin
      // group to identity before CameraManager begins a navigation transition.
      this.globeGroup.quaternion
        .premultiply(spinQ)
        .normalize();

      this.idleSpinGroup.quaternion.identity();
      this.idleSpinGroup.rotation.set(0,0,0);
      this.idleSpinGroup.updateMatrixWorld(true);
    }

    getResponsiveProfile(){
      return this.camera.aspect<1.55
        ? 'tablet'
        : 'desktop';
    }

    syncView(nav,panel,onComplete=null){
      const intent=this.resolveDesiredView(nav,panel);

      if(!intent){
        console.warn(
          '[CameraManager] Unable to resolve intent',
          nav,
          panel
        );
        return;
      }

      const device=this.getResponsiveProfile();
      const key=[
        intent.mode,
        intent.target,
        intent.variant,
        device
      ].join(':');

      if(key===this.currentIntentKey && !this.activeTransition){
        if(typeof onComplete==='function'){
          queueMicrotask(onComplete);
        }
        return;
      }

      this.currentIntentKey=key;
      this.executeTransition(intent,onComplete);
    }

    resolveDesiredView(nav,panel){
      if(nav.level==='intro'){
        return {
          mode:'world',
          target:'WORLD',
          variant:'collapsed'
        };
      }

      if(nav.level==='continent'){
        return {
          mode:'continent',
          target:nav.continent,
          variant:panel
        };
      }

      if(nav.level==='country'){
        return panel==='collapsed'
          ? {
              mode:'continent',
              target:nav.continent,
              variant:'collapsed'
            }
          : {
              mode:'country',
              target:nav.country,
              variant:'expanded'
            };
      }

      if(nav.level==='province'){
        return panel==='collapsed'
          ? {mode:'country',target:'CHN',variant:'expanded'}
          : {mode:'province',target:nav.province,variant:'expanded'};
      }

      if(nav.level==='city'){
        if(panel==='collapsed'){
          return nav.province
            ? {mode:'province',target:nav.province,variant:'expanded'}
            : {mode:'continent',target:nav.continent,variant:'collapsed'};
        }
        return {
          mode:'city',
          target:nav.city,
          variant:'expanded'
        };
      }

      return null;
    }

    getTargetParams(intent){
      if(intent.mode==='world'){
        return {
          quat:initialQuaternion.clone(),
          dist:CAMERA_MACRO_POS.z,
          composition:{x:.5,y:.5}
        };
      }

      if(intent.mode==='continent'){
        const config=CONTINENT_VIEW_CONFIG[intent.target];
        const device=this.getResponsiveProfile();

        if(config){
          const profile=
            config.profiles[device]?.[intent.variant]
            ?? config.profiles.desktop?.[intent.variant];

          if(!profile){
            throw new Error(
              `[CameraManager] Missing profile: ${intent.target}/${device}/${intent.variant}`
            );
          }

          return {
            quat:getCountryTargetQuaternion(
              config.focus.lat,
              config.focus.lng
            ),
            dist:profile.distance,
            composition:{
              x:profile.composition?.x ?? .5,
              y:profile.composition?.y ?? .5
            }
          };
        }

        // Generic fallback for continents not yet director-authored.
        const continent=CONTINENT_DATA[intent.target];
        if(!continent){
          throw new Error(
            `[CameraManager] Missing continent data: ${intent.target}`
          );
        }

        const [lat,lng]=continent.center;
        const collapsed=intent.variant==='collapsed';
        const dist=device==='tablet'
          ? (collapsed ? 4.12 : 4.48)
          : (collapsed ? 3.94 : 4.30);

        return {
          quat:getCountryTargetQuaternion(lat,lng),
          dist,
          composition:{x:collapsed ? .58 : .50,y:.50}
        };
      }

      if(intent.mode==='country'){
        const country=COUNTRY_DATA[intent.target];

        if(!country){
          throw new Error(
            `[CameraManager] Missing country data: ${intent.target}`
          );
        }

        const [lat,lng]=country.center;
        const device=this.getResponsiveProfile();
        const dist=getCountryViewDistance(intent.target,device);
        const finalCameraPosition=new THREE.Vector3(
          this.camera.position.x,
          this.camera.position.y,
          dist
        );

        return {
          quat:getCountryTargetQuaternion(
            lat,
            lng,
            finalCameraPosition
          ),
          dist,
          composition:{x:.50,y:.50},
          duration:1150,
          arc:.16
        };
      }

      if(intent.mode==='province'){
        const province=CHINA_PROVINCE_DATA[intent.target];
        if(!province){
          throw new Error(`[CameraManager] Missing province data: ${intent.target}`);
        }
        const [lat,lng]=province.center;
        const device=this.getResponsiveProfile();
        const large=new Set(['XINJIANG','TIBET','INNER_MONGOLIA','QINGHAI','SICHUAN','YUNNAN']);
        const compact=new Set(['BEIJING','TIANJIN','SHANGHAI','HONG_KONG','MACAU','HAINAN']);
        let dist=large.has(intent.target) ? 2.92 : compact.has(intent.target) ? 2.28 : 2.52;
        if(device==='tablet') dist+=.14;
        const finalCameraPosition=new THREE.Vector3(this.camera.position.x,this.camera.position.y,dist);
        return {
          quat:getCountryTargetQuaternion(lat,lng,finalCameraPosition),
          dist,
          composition:{x:.50,y:.50},
          duration:1200,
          arc:.20
        };
      }

      if(intent.mode==='city'){
        const coords=
          CITY_VIEW_COORDS[intent.target] ||
          CHINA_CITY_VIEW_COORDS[intent.target];

        if(!coords){
          throw new Error(
            `[CameraManager] Missing city coordinates: ${intent.target}`
          );
        }

        const [lat,lng]=coords;
        const device=this.getResponsiveProfile();
        const cityProfile=
          CITY_CONFIG[device]
          ?? CITY_CONFIG.desktop;

        // Camera keeps its current X/Y framing, but moves much closer on Z.
        // Calculate the city-facing quaternion against that FINAL camera vector.
        const finalCameraPosition=new THREE.Vector3(
          this.camera.position.x,
          this.camera.position.y,
          cityProfile.distance
        );

        return {
          quat:getCountryTargetQuaternion(
            lat,
            lng,
            finalCameraPosition
          ),
          dist:cityProfile.distance,
          composition:{x:.50,y:.50},
          duration:cityProfile.duration,
          arc:cityProfile.arc
        };
      }

      throw new Error(
        `[CameraManager] Unsupported view mode: ${intent.mode}`
      );
    }

    executeTransition(intent,onComplete=null){
      if(flyAnimation){
        flyAnimation.cancelled=true;
        flyAnimation=null;
      }

      // Cancel the previous native transition. Its completion callback is
      // intentionally discarded: only the newest user intent may commit UI.
      this.activeTransition=null;

      this.absorbIdleSpinIntoNavigation();

      // Fold the current user yaw/pitch into the navigation quaternion first.
      // This preserves the exact visible pose, then gives the automatic
      // transition exclusive control without any one-frame snap.
      interactionManager.absorbIntoNavigation();
      interactionManager.setEnabled(false);

      const params=this.getTargetParams(intent);
      const serial=++this.transitionSerial;

      cameraTransitionActive=true;

      this.activeTransition={
        serial,
        intent,
        params,
        startTime:performance.now(),
        durationMs:params.duration ?? 1000,
        startQuat:this.globeGroup.quaternion.clone(),
        startCamera:this.camera.position.clone(),
        targetCamera:null,
        startZ:this.camera.position.z,
        startComp:{
          x:this.composer.currentCompositionX,
          y:this.composer.currentCompositionY
        },
        onComplete
      };
    }

    _easePower3InOut(t){
      return t<.5
        ? 4*t*t*t
        : 1-Math.pow(-2*t+2,3)/2;
    }

    tick(now=performance.now(),deltaSeconds=0){
      const tr=this.activeTransition;

      if(!tr){
        const interactionSettled=
          interactionManager.enabled &&
          !interactionManager.isDragging &&
          Math.abs(interactionManager.yawVelocity)<1e-4;

        const shouldIdleSpin=
          navigationState.level==='intro' &&
          appState==='intro' &&
          interactionSettled;

        if(shouldIdleSpin){
          const dt=THREE.MathUtils.clamp(deltaSeconds,0,0.05);
          const angle=this.idleSpinSpeed*dt;

          if(angle>0){
            // Rotate around the local Y axis of the fixed -23.5° tilt frame.
            // This is a true tilted-axis spin, not a mutation of navigation.
            this.idleSpinGroup.rotation.y=
              THREE.MathUtils.euclideanModulo(
                this.idleSpinGroup.rotation.y+angle+Math.PI,
                Math.PI*2
              )-Math.PI;
          }
        }

        return;
      }

      const rawT=THREE.MathUtils.clamp(
        (now-tr.startTime)/tr.durationMs,
        0,
        1
      );
      const t=this._easePower3InOut(rawT);

      this.globeGroup.quaternion
        .slerpQuaternions(
          tr.startQuat,
          tr.params.quat,
          t
        )
        .normalize();

      const baseZ=THREE.MathUtils.lerp(
        tr.startZ,
        tr.params.dist,
        t
      );

      // Transition-specific dolly arc. Countries use a subtle arc; cities use
      // a stronger one so the spatial jump remains readable at deep zoom.
      const transitionArc=
        Math.sin(Math.PI*rawT)*(tr.params.arc ?? 0);

      if(tr.targetCamera){
        this.camera.position.lerpVectors(
          tr.startCamera,
          tr.targetCamera,
          t
        );
      }else{
        this.camera.position.z=baseZ+transitionArc;
      }
      this.camera.lookAt(0,0,0);

      const nextCompX=THREE.MathUtils.lerp(
        tr.startComp.x,
        tr.params.composition.x,
        t
      );
      const nextCompY=THREE.MathUtils.lerp(
        tr.startComp.y,
        tr.params.composition.y,
        t
      );

      // Projection matrix updates are not free. Skip them when composition
      // is unchanged (the common city-to-city case).
      if(
        Math.abs(nextCompX-this.composer.currentCompositionX)>.0001 ||
        Math.abs(nextCompY-this.composer.currentCompositionY)>.0001
      ){
        this.composer.apply(nextCompX,nextCompY);
      }

      if(rawT<1) return;

      // Snap once to the exact target to avoid accumulated floating error.
      this.globeGroup.quaternion.copy(tr.params.quat).normalize();
      if(tr.targetCamera){
        this.camera.position.copy(tr.targetCamera);
      }else{
        this.camera.position.z=tr.params.dist;
      }
      this.camera.lookAt(0,0,0);

      if(
        Math.abs(tr.params.composition.x-this.composer.currentCompositionX)>.0001 ||
        Math.abs(tr.params.composition.y-this.composer.currentCompositionY)>.0001
      ){
        this.composer.apply(
          tr.params.composition.x,
          tr.params.composition.y
        );
      }

      if(tr.verifyCode){
        if(getCountryFrontScore(tr.verifyCode)<.985){
          forceCountryToFront(tr.verifyCode);
        }

        if(!isNorthUpQuaternion(this.globeGroup.quaternion)){
          forceCountryToFront(tr.verifyCode);
        }
      }

      this.activeTransition=null;
      cameraTransitionActive=false;
      interactionManager.setEnabled(true);

      if(tr.intent.mode==='world'){
        this.composer.clear();
      }

      if(typeof tr.onComplete==='function'){
        tr.onComplete();
      }
    }

    flyToCoordinates(
      lat,
      lng,
      {
        duration=950,
        cameraTarget=CAMERA_MACRO_POS,
        verifyCode=null,
        onComplete=null
      }={}
    ){
      if(flyAnimation){
        flyAnimation.cancelled=true;
        flyAnimation=null;
      }

      // Cancel any previous native transition. The newest intent owns the globe.
      this.activeTransition=null;
      this.currentIntentKey=null;

      // Preserve the currently visible Navigation × Yaw × Pitch orientation,
      // then hand exclusive control to CameraManager for the transition.
      interactionManager.absorbIntoNavigation();
      interactionManager.setEnabled(false);

      const params={
        quat:getCountryTargetQuaternion(lat,lng),
        dist:cameraTarget.z,
        composition:{
          x:this.composer.currentCompositionX,
          y:this.composer.currentCompositionY
        }
      };

      const serial=++this.transitionSerial;
      cameraTransitionActive=true;

      this.activeTransition={
        serial,
        intent:{
          mode:'legacy-coordinate',
          target:`${lat}:${lng}`,
          variant:'direct'
        },
        params,
        startTime:performance.now(),
        durationMs:duration,
        startQuat:this.globeGroup.quaternion.clone(),
        startCamera:this.camera.position.clone(),
        targetCamera:cameraTarget.clone(),
        startZ:this.camera.position.z,
        startComp:{
          x:this.composer.currentCompositionX,
          y:this.composer.currentCompositionY
        },
        verifyCode,
        onComplete
      };
    }

    releaseToLegacy(){
      interactionManager.absorbIntoNavigation();
      interactionManager.setEnabled(true);
      this.activeTransition=null;
      cameraTransitionActive=false;
      this.currentIntentKey=null;
      this.composer.clear();
    }

    invalidateIntent(){
      this.currentIntentKey=null;
    }
  }

  const cameraManager=new CameraManager(

    }={}
  ){

  function animateCameraTo(
    target,
    duration=650
  ){
    const startCamera=camera.position.clone();
    const start=performance.now();

    function ease(t){
      return 1-Math.pow(1-t,3);
    }

    function step(now){
      const t=Math.min(
        1,
        (now-start)/duration
      );

      camera.position.lerpVectors(
        startCamera,
        target,
        ease(t)
      );

      camera.lookAt(0,0,0);

      if(t<1){
        requestAnimationFrame(step);
      }
    }

    requestAnimationFrame(step);
  }

  function animateEarthShift(
    targetX,
    duration=620
  ){
    const startX=earthTiltGroup.position.x;
    const start=performance.now();

    function ease(t){
      return 1-Math.pow(1-t,3);
    }

    function step(now){
      const t=Math.min(
        1,
        (now-start)/duration
      );

      earthTiltGroup.position.x=
        THREE.MathUtils.lerp(
          startX,
          targetX,
          ease(t)
        );

      if(t<1){
        requestAnimationFrame(step);
      }
    }

    requestAnimationFrame(step);
  }

  function animateReturnToInitial(
    duration=900
  ){
    if(flyAnimation){
      flyAnimation.cancelled=true;
      flyAnimation=null;
    }

    const startQ=globeGroup.quaternion.clone();
    const startCamera=camera.position.clone();
    const startShift=earthTiltGroup.position.x;
    const start=performance.now();

    function ease(t){
      return t<.5
        ? 4*t*t*t
        : 1-Math.pow(-2*t+2,3)/2;
    }

    function step(now){
      const t=Math.min(
        1,
        (now-start)/duration
      );

      const e=ease(t);

      globeGroup.quaternion.slerpQuaternions(
        startQ,
        initialQuaternion,
        e
      );

      camera.position.lerpVectors(
        startCamera,
        CAMERA_MACRO_POS,
        e
      );

      earthTiltGroup.position.x=
        THREE.MathUtils.lerp(
          startShift,
          0,
          e
        );

      camera.lookAt(0,0,0);

      if(t<1){
        requestAnimationFrame(step);
      }
    }

    requestAnimationFrame(step);
  }

  function setRightPanelCollapsed(
    collapsed,
    {restoreContent=true}={}
  ){
    panelCollapsed=Boolean(collapsed);
    panelState=panelCollapsed
      ? 'collapsed'
      : 'expanded';

    const isEuropePilot=
      selectedContinentKey==='EUROPE';

    stage.classList.toggle(
      'right-collapsed',
      panelCollapsed
    );

    panelToggleIcon.textContent=
      panelCollapsed
        ? '‹'
        : '×';

    panelToggle.setAttribute(
      'aria-label',
      panelCollapsed
        ? '展开右侧信息栏'
        : '收起右侧信息栏'
    );

    if(panelCollapsed){
      if(selectedContinentKey){
        renderContinentPanel(
          selectedContinentKey
        );
      }

      if(isEuropePilot){
        if(selectedCountryCode){
          setCountryHighlightStrength('weak');
        }
      }else{
        animateEarthShift(.45);
      }
    }else{
      if(!isEuropePilot){
        animateEarthShift(0);
      }

      if(!restoreContent){
        requestAnimationFrame(()=>{
          resizeToContainer();
          if(isEuropePilot){
            syncWorldView();
          }
        });
        return;
      }

      if(
        (appState==='country' || appState==='province' || appState==='city') &&
        selectedCountryCode
      ){
        const place=getSelectedPlaceData();
        const city=selectedCityFocused
          ? place?.cities.find(item=>item.id===selectedCityId)
          : null;

        if(selectedProvinceId){
          renderProvincePanel(selectedProvinceId,city || null);
          renderCities(selectedCountryCode);
        }else{
          renderCountryPanel(selectedCountryCode,city || null);
          if(selectedCountryCode==='CHN' && appState==='country'){
            renderProvinceList();
          }else{
            renderCities(selectedCountryCode);
          }
        }

        if(isEuropePilot){
          setCountryHighlightStrength('strong');
        }
      }else if(
        appState==='continent' &&
        selectedContinentKey
      ){
        renderContinentPanel(
          selectedContinentKey
        );

        renderCountryList(
          selectedContinentKey
        );
      }
    }

    requestAnimationFrame(()=>{
      resizeToContainer();

      if(isEuropePilot){
        syncWorldView();
      }
    });
  }

    selectedContinentKey=key;

  // V10.6-A6: one authoritative City -> Parent exit path.
  // All UI controls and globe taps call this function so navigation state,
  // camera intent, locator, outline and DOM can never diverge.
  function exitCityToParent({fly=true,restorePanel=true}={}){
    if(appState!=='city' && navigationState.level!=='city'){
      return false;
    }

    selectedCityFocused=false;
    selectedCityId=null;
    navigationState.city=null;
    clearCityLocator();

    if(restorePanel){
      setRightPanelCollapsed(false,{restoreContent:false});
    }

    if(selectedProvinceId){
      navigationState.level='province';
      navigationState.country='CHN';
      navigationState.province=selectedProvinceId;
      setStageState('province');
      setChinaProvinceBoundariesVisible(true);
      renderProvincePanel(selectedProvinceId);
      renderCities(selectedCountryCode);
      updateOutline(selectedProvinceId);
    }else{
      navigationState.level='country';
      navigationState.province=null;
      setStageState('country');
      renderCountryPanel(selectedCountryCode);
      if(selectedCountryCode==='CHN'){
        renderProvinceList();
        setChinaProvinceBoundariesVisible(true);
      }else{
        renderCities(selectedCountryCode);
        setChinaProvinceBoundariesVisible(false);
      }
      updateOutline(selectedCountryCode);
    }

    setCountryHighlightStrength('strong');

    if(fly){
      cameraManager.invalidateIntent();
      syncWorldView();
    }

    return true;
  }

  // V10.6-A8: release China-only province/city context before a direct
  // cross-border country switch. This deliberately performs no camera move;
  // the newly selected world country owns the single transition that follows.
  function releaseChinaDrilldownContext({restorePanel=true}={}){
    if(selectedCountryCode!=='CHN'){

    selectedProvinceId=null;
    selectedCityId=null;

  }
