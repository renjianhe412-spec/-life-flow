<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><div class="logo">CT</div><div><h1>资本轨道 V10.0</h1><p>PRODUCT · MARKET · CASH FLOW</p></div></div>
    <div class="era-box"><span class="era-pill" id="eraPill">正常时代</span><select id="eraMode"><option value="normal">正常时代</option><option value="boom">繁荣时代</option><option value="tight">紧缩时代</option></select></div>
    <button class="reset" id="resetBtn">重置实验</button>
  </header>

  <main class="layout">
    <section class="panel left">
      <div class="section-head"><h2>产品实验室</h2><p>调整产品 DNA 与财务参数，观察不同市场如何响应。</p></div>
      <div id="productControls"></div>
      <div class="hint">这只是 V10.0 MVP：先验证产品—市场匹配、销量与利润的因果链是否符合商业直觉。</div>
    </section>

    <section class="panel center">
      <div class="section-head"><h2>三类样本市场</h2><p>先跑通差异，再扩展到全球城市。</p></div>
      <div class="city-grid" id="cityGrid"></div>
    </section>

    <section class="panel right">
      <div class="detail-top"><div><h2 id="detailTitle">Alpha</h2><p id="detailTag"></p></div><div class="fit-score"><div><b id="bigFit">0</b><small>综合匹配</small></div></div></div>
      <div class="kpi-grid"><div class="kpi"><small>预计销量</small><b id="salesValue">0</b></div><div class="kpi"><small>预计收入</small><b id="revenueValue">¥0</b></div><div class="kpi"><small>经营利润</small><b id="profitValue">¥0</b></div><div class="kpi"><small>单件贡献</small><b id="unitValue">¥0</b></div></div>
      <div class="segments"><h3>细分客群表现</h3><div id="segmentTable"></div></div>
      <div class="explain"><h3>解释引擎</h3><div class="explain-box" id="explainBox"></div></div>
    </section>
  </main>
</div>

<script>
const ATTRIBUTES = [
  'pricePosition',
  'innovation',
  'performance',
  'durability',
  'design',
  'brand'
];

const worldState = {

};


function clamp(value, min = 0, max = 1) {
  return Math.max(min, Math.min(max, value));
}

function getEraAdjustedSegment(segment, worldState) {
  const adjusted = structuredClone(segment);

  if (worldState.era === 'tight') {
    adjusted.ideal.pricePosition = clamp(adjusted.ideal.pricePosition - 0.15);
    adjusted.weights.pricePosition *= 1.4;
    adjusted.weights.innovation *= 0.85;
    adjusted.weights.design *= 0.90;
  } else if (worldState.era === 'boom') {
    adjusted.ideal.pricePosition = clamp(adjusted.ideal.pricePosition + 0.10);
    adjusted.weights.innovation *= 1.25;
    adjusted.weights.design *= 1.15;
    adjusted.weights.pricePosition *= 0.80;
  }

  if (worldState.technologyMomentum > 0.72) {
    adjusted.weights.innovation *= 1.12;
  }

  if (worldState.financialStress > 0.60) {
    adjusted.weights.pricePosition *= 1.15;
  }

  return adjusted;
}

function calculateMatch(segment, product) {
  let weightedDifference = 0;
  let totalWeight = 0;

  for (const key of ATTRIBUTES) {
    const weight = segment.weights[key] ?? 0;
    const difference = Math.abs(segment.ideal[key] - product.dna[key]);
    weightedDifference += difference * weight;
    totalWeight += weight;
  }

  if (totalWeight <= 0) return 0;
  const normalizedDifference = weightedDifference / totalWeight;
  return Math.round(clamp((1 - normalizedDifference), 0, 1) * 100);
}

function calculateAffordability(categoryBudget, retailPrice) {
  const ratio = retailPrice / categoryBudget;
  if (ratio <= 0.8) return 1.0;
  if (ratio <= 1.0) return 0.9;
  if (ratio <= 1.2) return 0.65;
  if (ratio <= 1.5) return 0.35;
  if (ratio <= 2.0) return 0.12;
  return 0.03;
}

function calculateAwareness(product) {
  const brandBase = product.dna.brand * 0.45;
  const marketingEffect = Math.log1p(product.financials.marketingSpend / 100000) * 0.08;
  return clamp(0.20 + brandBase + marketingEffect, 0.20, 1);
}

function calculateCityPerformance(city, product, worldState) {
  let totalSales = 0;
  const segmentResults = [];
  const awareness = calculateAwareness(product);
  const distribution = clamp(product.financials.distributionCoverage, 0, 1);
  const competitionFactor = clamp(1 - city.competitionLevel * 0.45, 0.35, 1);

  for (const baseSegment of city.segments) {
    const segment = getEraAdjustedSegment(baseSegment, worldState);
    const matchScore = calculateMatch(segment, product);
    const fitFactor = Math.pow(matchScore / 100, 1.6);
    const affordability = calculateAffordability(segment.categoryBudget, product.financials.retailPrice);
    const segmentPotential = city.annualCategoryBuyers * segment.proportion * segment.baseDemandRate;

    const sales = Math.floor(
      segmentPotential *
      fitFactor *
      Math.pow(affordability, 1.3) *
      awareness *
      distribution *
      competitionFactor
    );

    totalSales += sales;
    segmentResults.push({
      segmentId: segment.id,
      segmentName: segment.name,
      matchScore,
      affordability,
      sales
    });
  }

  const unitRevenue = product.financials.retailPrice;
  const channelFeePerUnit = unitRevenue * product.financials.channelFeeRate;
  const contributionPerUnit = unitRevenue - product.financials.unitCost - channelFeePerUnit - city.logisticsCostPerUnit;
  const revenue = totalSales * unitRevenue;
  const operatingProfit = totalSales * contributionPerUnit - product.financials.marketingSpend;

  return {
    cityId: city.id,
    cityName: city.name,
    totalSales,
    revenue,
    operatingProfit,
    contributionPerUnit,
    awareness,
    competitionFactor,
    segmentResults
  };
}

function explainPerformance(city, product, result) {
  const sorted = [...result.segmentResults].sort((a, b) => b.sales - a.sales);
  const best = sorted[0];
  const weakest = [...result.segmentResults].sort((a, b) => a.matchScore - b.matchScore)[0];
  const messages = [];

  messages.push(`${city.name} 中，销量贡献最大的是“${best.segmentName}”，预计贡献 ${best.sales.toLocaleString()} 件。`);

  if (weakest.matchScore < 60) {
    messages.push(`“${weakest.segmentName}”匹配较弱，当前产品并不适合覆盖全部客群。`);
  }

  const lowAfford = result.segmentResults.filter(s => s.affordability < 0.4);
  if (lowAfford.length) {
    messages.push(`当前售价对 ${lowAfford.map(s => s.segmentName).join('、')} 的购买门槛较高。`);
  }

  if (product.dna.brand < 0.5) {
    messages.push('品牌力偏弱，营销与渠道建设可能比继续堆性能更有效。');
  }

  if (product.dna.innovation > 0.85 && city.tag.includes('创新')) {
    messages.push('高创新属性与该市场需求一致，是当前产品的主要优势。');
  }

  if (messages.length < 3) {
    messages.push('当前产品整体匹配较均衡，可继续通过价格、品牌与渠道覆盖寻找利润最优点。');
  }

  return messages;
}


const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => [...document.querySelectorAll(sel)];

const workingProduct = structuredClone(product);
const workingWorld = structuredClone(worldState);
let selectedCityId = 'alpha';

const labels = {
  pricePosition: '价格定位',
  innovation: '创新',
  performance: '性能',
  durability: '耐用',
  design: '设计',
  brand: '品牌'
};

function fmtMoney(v) {
  const abs = Math.abs(v);
  if (abs >= 1e8) return `${v < 0 ? '-' : ''}¥${(abs / 1e8).toFixed(2)}亿`;
  if (abs >= 1e4) return `${v < 0 ? '-' : ''}¥${(abs / 1e4).toFixed(1)}万`;
  return `${v < 0 ? '-' : ''}¥${Math.round(abs).toLocaleString()}`;
}

function renderControls() {
  const host = $('#productControls');
  host.innerHTML = '';

  Object.entries(workingProduct.dna).forEach(([key, value]) => {
    const row = document.createElement('label');
    row.className = 'control-row';
    row.innerHTML = `
      <div class="control-head"><span>${labels[key]}</span><b id="val-${key}">${Math.round(value * 100)}</b></div>
      <input type="range" min="0" max="100" value="${Math.round(value * 100)}" data-key="${key}">
    `;
    host.appendChild(row);
  });

  host.innerHTML += `
    <label class="control-row"><div class="control-head"><span>零售价</span><b id="val-price">¥${workingProduct.financials.retailPrice.toLocaleString()}</b></div><input type="range" min="1999" max="12999" step="100" value="${workingProduct.financials.retailPrice}" id="retailPrice"></label>
    <label class="control-row"><div class="control-head"><span>营销预算</span><b id="val-marketing">${fmtMoney(workingProduct.financials.marketingSpend)}</b></div><input type="range" min="0" max="12000000" step="250000" value="${workingProduct.financials.marketingSpend}" id="marketingSpend"></label>
  `;

  $$('[data-key]').forEach(input => {
    input.addEventListener('input', e => {
      const key = e.target.dataset.key;
      workingProduct.dna[key] = Number(e.target.value) / 100;
      $(`#val-${key}`).textContent = e.target.value;
      renderAll();
    });
  });

  $('#retailPrice').addEventListener('input', e => {
    workingProduct.financials.retailPrice = Number(e.target.value);
    $('#val-price').textContent = `¥${Number(e.target.value).toLocaleString()}`;
    renderAll();
  });

  $('#marketingSpend').addEventListener('input', e => {
    workingProduct.financials.marketingSpend = Number(e.target.value);
    $('#val-marketing').textContent = fmtMoney(Number(e.target.value));
    renderAll();
  });
}

function renderEra() {
  $('#eraMode').value = workingWorld.era;
  $('#eraPill').textContent = workingWorld.era === 'boom' ? '繁荣时代' : workingWorld.era === 'tight' ? '紧缩时代' : '正常时代';
}

function renderCities() {
  const host = $('#cityGrid');
  host.innerHTML = '';

  Object.values(cities).forEach(city => {
    const result = calculateCityPerformance(city, workingProduct, workingWorld);
    const avgFit = Math.round(result.segmentResults.reduce((a, s) => a + s.matchScore, 0) / result.segmentResults.length);
    const card = document.createElement('button');
    card.className = `city-card ${city.id === selectedCityId ? 'active' : ''}`;
    card.innerHTML = `
      <div class="city-top"><div><h3>${city.name}</h3><p>${city.tag}</p></div><span class="fit">${avgFit}</span></div>
      <div class="city-kpis"><div><small>预计销量</small><b>${result.totalSales.toLocaleString()}</b></div><div><small>经营利润</small><b class="${result.operatingProfit >= 0 ? 'pos' : 'neg'}">${fmtMoney(result.operatingProfit)}</b></div></div>
    `;
    card.addEventListener('click', () => { selectedCityId = city.id; renderAll(); });
    host.appendChild(card);
  });
}

function renderDetail() {
  const city = cities[selectedCityId];
  const result = calculateCityPerformance(city, workingProduct, workingWorld);
  const avgFit = Math.round(result.segmentResults.reduce((a, s) => a + s.matchScore, 0) / result.segmentResults.length);

  $('#detailTitle').textContent = city.name;
  $('#detailTag').textContent = city.tag;
  $('#bigFit').textContent = avgFit;
  $('#salesValue').textContent = result.totalSales.toLocaleString();
  $('#revenueValue').textContent = fmtMoney(result.revenue);
  $('#profitValue').textContent = fmtMoney(result.operatingProfit);
  $('#unitValue').textContent = fmtMoney(result.contributionPerUnit);

  $('#segmentTable').innerHTML = result.segmentResults.map(seg => `
    <div class="segment-row">
      <div><b>${seg.segmentName}</b><small>匹配 ${seg.matchScore} · 可负担 ${(seg.affordability * 100).toFixed(0)}%</small></div>
      <strong>${seg.sales.toLocaleString()}</strong>
    </div>
  `).join('');

  $('#explainBox').innerHTML = explanation.map(x => `<p>${x}</p>`).join('');
}

function renderAll() {
  renderEra();
  renderCities();
  renderDetail();
}

$('#eraMode').addEventListener('change', e => {
  workingWorld.era = e.target.value;
  renderAll();
});

$('#resetBtn').addEventListener('click', () => location.reload());

renderControls();
renderAll();

</script>

</body>
</html>
