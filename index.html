function companyBorrow(){let c=state.company;if(!c)return;c.cash+=300000;c.debt+=300000;state.credit-=8;renderTab()}
function renderAll(){renderBoard();renderMacro();renderTab()}
function renderTab(){let body=$('#tabBody');$$('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===currentTab));if(currentTab==='news'){body.innerHTML=state.newsLog.length?state.newsLog.map(n=>`<div class="row"><h4>🌍 ${n.title}</h4><p>${n.text}</p></div>`).join(''):'<div class="row"><p>还没有新闻。</p></div>'}
if(currentTab==='bank'){let depRate=state.macro.rate*.65,loan=state.macro.rate+4.2;body.innerHTML=`<div class="grid2"><div class="kpi"><small>账户现金</small><b>${fmt(state.cash)}</b></div><div class="kpi"><small>定期存款</small><b>${fmt(state.deposit)}</b></div><div class="kpi"><small>存款利率</small><b>${depRate.toFixed(1)}%</b></div><div class="kpi"><small>贷款利率</small><b>${loan.toFixed(1)}%</b></div><div class="kpi"><small>个人负债</small><b>${fmt(state.debt)}</b></div><div class="kpi"><small>信用评分</small><b>${Math.round(state.credit)}</b></div></div><div class="actions"><button class="mini buy" onclick="bankDeposit(50000)">存入5万</button><button class="mini" onclick="bankWithdraw(50000)">取出5万</button><button class="mini sell" onclick="bankLoan(100000)">借款10万</button><button class="mini" onclick="repay(100000)">还款10万</button></div><div class="lesson"><b>利率和经济是连着的</b><p>加息后，存款收益通常更高，但贷款也更贵；高负债玩家会更难受。</p></div>`}
if(currentTab==='stocks'){body.innerHTML=Object.entries(state.stocks).map(([k,s])=>`<div class="row"><h4>${s.name}指数 · ${s.price.toFixed(1)}</h4><p>持有 ${s.hold.toFixed(1)}份 · 市值 ${fmt(s.hold*s.price)}</p><div class="actions"><button class="mini buy" onclick="buyStock('${k}',20000)">买2万</button><button class="mini sell" onclick="sellStock('${k}',.25)">卖25%</button></div></div>`).join('')}
if(currentTab==='company'){if(!state.company){body.innerHTML='<div class="row"><h4>尚未拥有公司</h4><p>走到企业格并选择创业机会后，会解锁季度经营。每3个月可以重新决定价格、产量、员工、工资、培训、营销和研发。</p></div>';return}let c=state.company;body.innerHTML=`<div class="section-title"><b>CEO季度经营</b><span>${c.ready?'可决策':'等待下个季度'}</span></div><div class="company-grid"><div class="field"><label>产品价格</label><input id="coPrice" type="number" value="${c.price}"></div><div class="field"><label>季度计划产量</label><input id="coProd" type="number" value="${c.production}"></div><div class="field"><label>员工人数</label><input id="coEmp" type="number" value="${c.employees}"></div><div class="field"><label>月工资/人</label><input id="coWage" type="number" value="${c.wage}"></div><div class="field"><label>培训预算</label><select id="coTrain"><option value="0">0</option><option value="30000">3万</option><option value="90000">9万</option></select></div><div class="field"><label>营销预算</label><select id="coMkt"><option value="0">0</option><option value="50000">5万</option><option value="140000">14万</option></select></div><div class="field"><label>研发预算</label><select id="coRnd"><option value="0">0</option><option value="60000">6万</option><option value="180000">18万</option></select></div><div class="field"><label>融资</label><button class="mini" style="width:100%" onclick="companyBorrow()">公司借款30万</button></div></div><div class="actions"><button class="primary" onclick="submitCompany()" ${c.ready?'':'disabled'}>执行本季度经营</button></div><div class="report">公司现金 ${fmt(c.cash)} · 库存 ${Math.round(c.inventory)} · 品牌 ${c.brand.toFixed(0)} · 研发 ${c.rnd.toFixed(0)} · 负债 ${fmt(c.debt)}${c.last?`<br>上季收入 ${fmt(c.last.revenue)} · 利润 ${fmt(c.last.profit)} · 销量 ${Math.round(c.last.sales)} · 员工效率 ${c.last.productivity.toFixed(2)}`:''}</div>`}
if(currentTab==='learn'){body.innerHTML=Object.entries(knowledge).map(([k,v])=>`<div class="row"><h4>${state.knowledge.has(k)?'✅':'🔒'} ${v.name}</h4><p>${state.knowledge.has(k)?`${v.simple}<br>例子：${v.example}`:'在游戏中遇到相关问题后解锁。'}</p></div>`).join('')}
if(currentTab==='ledger'){body.innerHTML=state.decisions.slice().reverse().map(d=>`<div class="row"><h4>${d.age}岁 · ${d.title}</h4><p>选择：${d.choice}<br>当时：通胀${d.macro.infl.toFixed(1)}% · 利率${d.macro.rate.toFixed(1)}% · 增长${d.macro.growth.toFixed(1)}%</p></div>`).join('')||'<div class="row"><p>还没有决策记录。</p></div>'}}
function bankDeposit(x){x=Math.min(x,state.cash);state.cash-=x;state.deposit+=x;renderAll()}function bankWithdraw(x){x=Math.min(x,state.deposit);state.deposit-=x;state.cash+=x;renderAll()}function bankLoan(x){if(state.credit<560)return toast('信用评分不足');state.cash+=x;state.debt+=x;state.credit-=8;renderAll()}function repay(x){x=Math.min(x,state.cash,state.debt);state.cash-=x;state.debt-=x;state.credit+=4;renderAll()}function buyStock(k,x){buySector(k,x);renderAll()}function sellStock(k,r){sellSector(k,r);renderAll()}
function checkDeath(){if(state.age<60)return;let ageRisk=Math.pow((state.age-58)/35,2)*.08,healthRisk=(100-state.health)/500,stressRisk=state.stress/600,happyProtect=state.happy/1800;let p=clamp(ageRisk+healthRisk+stressRisk-happyProtect,.002,.65)*(state.speed/12);if(Math.random()<p||state.age>=105)endGame()}
function analyseMistakes(){let m=[];if(state.debt>Math.max(1,netWorth())*.65)m.push('杠杆过高：负债相对净资产太重，高利率时风险被放大。');let vals=Object.values(state.stocks).map(s=>s.hold*s.price),total=vals.reduce((a,b)=>a+b,0);if(total>0&&Math.max(...vals)/total>.65)m.push('投资过度集中：一次行业新闻就可能重创整个组合。');if(state.cash+state.deposit<state.expense*5)m.push('流动性不足：应急资金太薄，危机时容易被迫借钱或卖资产。');let badHigh=state.decisions.filter(d=>d.macro.rate>7&&d.choice.includes('杠杆')).length;if(badHigh)m.push('高利率阶段仍扩大杠杆，没有尊重融资成本。');if(state.company?.last&&state.company.last.inventory>state.company.last.sales*1.3)m.push('库存过重：生产超过真实需求，现金被锁在仓库。');if(!m.length)m.push('没有明显结构性错误，但好结果不等于所有选择都正确，运气也是结果的一部分。');return m.slice(0,5)}
function analyseStrengths(){let s=[];if(state.knowledge.size>=10)s.push('你把多个经济、金融和管理概念真正用进了决策。');if(state.cash+state.deposit>state.expense*10)s.push('流动性管理优秀，能承受较长时间的收入中断。');let vals=Object.values(state.stocks).map(x=>x.hold*x.price),t=vals.reduce((a,b)=>a+b,0);if(t>0&&Math.max(...vals)/t<.5)s.push('投资组合较分散，没有把全部风险押在一个行业。');if(state.company&&state.company.cash>0)s.push('公司仍然存活，说明你处理住了价格、产量、工资、库存和融资的冲突。');if(!s.length)s.push('你敢于尝试；下一局可以加强风险预算和现金纪律。');return s.slice(0,5)}
function endGame(){let mistakes=analyseMistakes(),strengths=analyseStrengths(),score=Math.round(clamp(40+state.score+state.knowledge.size*2+Math.log10(Math.max(1,netWorth()+100000))*8-state.stress*.12,0,100));$('#endContent').innerHTML=`<h1>你的资本轨道已经结束</h1><div class="scorebox">${score}分</div><p>终年 ${state.age} 岁 · 净资产 ${fmt(netWorth())} · 掌握 ${state.knowledge.size} 个概念 · 做出 ${state.decisions.length} 次重大决策。</p><div class="end-grid"><div class="row"><h4>做得好的地方</h4><p>${strengths.map(x=>'✓ '+x).join('<br><br>')}</p></div><div class="row"><h4>最值得纠正的错误</h4><p>${mistakes.map(x=>'✗ '+x).join('<br><br>')}</p></div></div><div class="row"><h4>下一局建议</h4><p>${mistakes[0]||'尝试不同路线，并观察同一新闻怎样影响不同资产和公司。'}</p></div><button class="primary" onclick="location.reload()">重新开始一局</button>`;$('#endOverlay').classList.remove('hidden')}
function toast(t){let x=$('#toast');x.textContent=t;x.classList.add('show');setTimeout(()=>x.classList.remove('show'),2200)}function wait(ms){return new Promise(r=>setTimeout(r,ms))}
$$('.tab').forEach(b=>b.onclick=()=>{currentTab=b.dataset.tab;renderTab()});$('#rollBtn').onclick=rollDice;$('#startBtn').onclick=startGame;$('#saveBtn').onclick=()=>{localStorage.setItem('capitalTrackV8',JSON.stringify({...state,knowledge:[...state.knowledge],newsSeen:[...state.newsSeen],eventSeen:[...state.eventSeen]}));toast('已保存到本机')};
renderSetup();renderAll();
</script>
</body>
</html>
