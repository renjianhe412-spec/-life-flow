<title>资本轨道 V4.7 · 世界起点选择</title>
<style>
:root{
  --bg:#020611; --panel:rgba(4,14,29,.84); --panel2:rgba(8,24,43,.88);
  --line:rgba(112,188,255,.23); --line2:rgba(110,212,255,.46);
  --text:#f3f8ff; --muted:#8fa8c5; --blue:#65c8ff; --cyan:#8eeaff;
  --green:#67e0ae; --amber:#ffc873; --red:#ff8787;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020611;color:var(--text);font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
body{background:radial-gradient(circle at 50% 32%,#102845 0,#06101f 37%,#020611 72%,#010208 100%)}
button{font:inherit}
#globeViz{position:fixed;inset:0;z-index:1}
#globeViz canvas{filter:saturate(1.34) contrast(1.08) brightness(1.03)}
.topbar{
  position:fixed;left:20px;right:20px;top:max(14px,env(safe-area-inset-top));z-index:10;
  display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none
}
.brand{pointer-events:auto}
.brand h1{margin:0;font-size:24px;letter-spacing:.02em}
.brand h1 span{color:var(--blue)}
.brand p{margin:5px 0 0;color:var(--muted);font-size:11px;letter-spacing:.08em}
.quickCountries{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;max-width:56vw;pointer-events:auto}
.quickCountries button{
  border:1px solid var(--line);background:rgba(4,14,28,.72);color:#b9cee4;padding:8px 10px;border-radius:999px;
  backdrop-filter:blur(14px);cursor:pointer;font-size:11px
}
.quickCountries button.active{border-color:#63cfff;background:#0b2c49;color:#fff;box-shadow:0 0 0 3px rgba(99,207,255,.08)}
.panel{
  position:fixed;z-index:8;top:96px;bottom:26px;width:330px;padding:16px;border:1px solid var(--line);
  background:linear-gradient(180deg,rgba(5,16,33,.90),rgba(3,12,25,.84));backdrop-filter:blur(20px);
  border-radius:20px;box-shadow:0 24px 70px rgba(0,0,0,.34);overflow:auto;scrollbar-width:none
}
.panel::-webkit-scrollbar{display:none}
.left{left:20px}.right{right:20px;width:370px}
.countryHead{display:flex;align-items:center;gap:12px}
.flag{width:48px;height:34px;border-radius:7px;display:grid;place-items:center;font-size:27px;background:#0b1b2d;border:1px solid var(--line)}
.countryHead h2{margin:0;font-size:26px}.countryHead small{display:block;color:var(--muted);margin-top:3px}
.kdaBox{display:flex;align-items:end;justify-content:space-between;margin:16px 0 12px}
.kdaNum{font-size:52px;line-height:1;color:var(--blue);font-weight:700}
.kdaMeta{font-size:11px;color:var(--muted);padding-bottom:5px}.trend{font-size:12px;color:var(--green);padding-bottom:5px}
.summary{font-size:12px;line-height:1.7;color:#b8cade;margin:0 0 13px}
.section{border-top:1px solid rgba(126,183,234,.12);padding-top:12px;margin-top:12px}
.section h3{font-size:12px;margin:0 0 9px;color:#e8f4ff;letter-spacing:.03em}
.metric{display:grid;grid-template-columns:84px 1fr 28px;gap:8px;align-items:center;margin:8px 0;font-size:11px}
.metric span{color:#a6bad0}.bar{height:6px;border-radius:99px;background:#102a44;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,#2f90d5,#78dcff);border-radius:99px}.metric b{text-align:right}
.chips{display:flex;gap:6px;flex-wrap:wrap}.chip{padding:6px 8px;border-radius:9px;background:#0a2033;border:1px solid rgba(104,197,255,.16);font-size:10px;color:#bcd5e9}
.chip.good{color:#8ff2c8;border-color:rgba(103,224,174,.25);background:rgba(13,74,58,.24)}
.chip.risk{color:#ffaaaa;border-color:rgba(255,135,135,.25);background:rgba(78,23,30,.25)}
.route{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}.route div{padding:8px 9px;border-radius:10px;background:#091a2b;border:1px solid rgba(110,190,255,.13);font-size:10px;color:#bdd2e7}
.rightTitle{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rightTitle h2{margin:0;font-size:20px}.countryBadge{font-size:11px;color:#a8c6df;padding:6px 9px;border-radius:999px;border:1px solid var(--line);background:#071828}
.cityCard{
  display:grid;grid-template-columns:108px 1fr;gap:11px;padding:10px;margin:10px 0;border-radius:14px;
  background:rgba(10,27,47,.76);border:1px solid rgba(117,187,243,.16);cursor:pointer;transition:.18s ease
}
.cityCard:hover,.cityCard.selected{transform:translateY(-1px);border-color:#62caff;box-shadow:0 0 0 3px rgba(98,202,255,.08)}
.cityImg{width:108px;height:78px;border-radius:10px;object-fit:cover;background:linear-gradient(135deg,#12365a,#0b1728)}
.cityInfo h3{margin:0;font-size:16px}.cityInfo h3 small{font-size:11px;color:#8fa8c5;font-weight:500;margin-left:4px}
.cityInfo p{margin:4px 0;color:#a9bdd2;font-size:10px}
.cityTopline{display:flex;justify-content:space-between;align-items:center}.cityScore{font-size:11px;color:#76d8ff}
.cityTags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}.cityTags span{font-size:9px;padding:4px 6px;border-radius:7px;background:#0d2d49;color:#8edcff}
.cityAdvantages{margin-top:7px;font-size:10px;line-height:1.55;color:#bfd0e2}
.selectedDetail{
  margin-top:12px;padding:12px;border:1px solid rgba(255,200,115,.25);background:rgba(52,35,13,.17);border-radius:14px
}
.selectedDetail h3{margin:0 0 7px;font-size:15px}.miniGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.mini{padding:8px;border-radius:9px;background:rgba(255,255,255,.035);font-size:10px;color:#a9bdd2}.mini b{display:block;color:#fff;font-size:13px;margin-top:3px}
.confirm{
  margin-top:12px;width:100%;padding:13px;border-radius:12px;border:1px solid rgba(255,198,101,.66);
  color:#ffe0a7;background:linear-gradient(180deg,rgba(137,83,17,.56),rgba(70,38,8,.72));cursor:pointer;font-weight:700
}
.status{
  position:fixed;z-index:9;left:50%;bottom:18px;transform:translateX(-50%);padding:8px 12px;border-radius:999px;
  background:rgba(4,14,28,.78);border:1px solid var(--line);color:#a9c5dd;font-size:10px;backdrop-filter:blur(12px)
}
@media(max-width:1100px){
  .panel{width:280px}.right{width:320px}.cityCard{grid-template-columns:92px 1fr}.cityImg{width:92px;height:70px}
}
@media(max-width:820px){
  .topbar{left:10px;right:10px}.brand h1{font-size:20px}.quickCountries{display:none}
  .panel{top:84px;bottom:14px;width:238px;padding:12px}.left{left:10px}.right{right:10px;width:270px}
  .countryHead h2{font-size:21px}.kdaNum{font-size:42px}.cityCard{grid-template-columns:78px 1fr}.cityImg{width:78px;height:62px}
  .summary,.route{display:none}
}
</style>

  function flagEmoji(code){
    if(!code || code.length!==2) return '🌐';
    return String.fromCodePoint(...[...code.toUpperCase()].map(c=>127397+c.charCodeAt()));
  }
  function zhName(code,fallback){
    try{
      const n=displayNames && code && code.length===2 ? displayNames.of(code) : null;
      return n || fallback || '未知国家';
    }catch(e){return fallback || '未知国家'}
  }
  function fallbackProfile(code,name,continent){
    const seed=(code||name||'XX').split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    const base=continent==='Europe'?82:continent==='Asia'?75:continent==='North America'?84:continent==='Oceania'?82:70;
    const metrics={};
    metricLabels.forEach((k,i)=>metrics[k]=Math.max(45,Math.min(95,base+((seed+i*7)%17)-8)));
    const kda=(Object.values(metrics).reduce((a,b)=>a+b,0)/6).toFixed(1);
    return {name:name,en:name,kda,trend:'未来5年 →',
      summary:'该国家已接入地图选择。详细国家模型和城市数据库将在后续数据包中继续扩展。',
      metrics,advantages:['区域市场机会','本地产业基础','国际贸易连接'],
      risks:['宏观波动','就业转型','气候适应'],routes:['本地就业','创业','投资','国际贸易']};
  }

  function renderCountry(profile,code,continent){
    document.getElementById('flag').textContent=flagEmoji(code);
    document.getElementById('countryName').textContent=profile.name;
    document.getElementById('countryMeta').textContent=(profile.en||profile.name)+' · '+(continent||'World');
    document.getElementById('kdaNum').textContent=profile.kda;
    document.getElementById('trend').textContent=profile.trend;
    document.getElementById('summary').textContent=profile.summary;

    const metrics=document.getElementById('metrics');metrics.innerHTML='';
    metricLabels.forEach(label=>{
      const val=profile.metrics[label] ?? 70;
      const row=document.createElement('div');row.className='metric';
      row.innerHTML='<span>'+label+'</span><div class="bar"><i style="width:'+val+'%"></i></div><b>'+val+'</b>';
      metrics.appendChild(row);
    });

    const adv=document.getElementById('advantages');adv.innerHTML='';
    (profile.advantages||[]).forEach(t=>{const s=document.createElement('span');s.className='chip good';s.textContent=t;adv.appendChild(s)});
    const risks=document.getElementById('risks');risks.innerHTML='';
    (profile.risks||[]).forEach(t=>{const s=document.createElement('span');s.className='chip risk';s.textContent=t;risks.appendChild(s)});
    const routes=document.getElementById('routes');routes.innerHTML='';
    (profile.routes||[]).forEach(t=>{const d=document.createElement('div');d.textContent=t;routes.appendChild(d)});
    document.getElementById('cityCountry').textContent=profile.name;

    document.querySelectorAll('#quickCountries button').forEach(b=>b.classList.toggle('active',b.dataset.code===code));
  }

  function renderSelectedCity(city){
    const box=document.getElementById('selectedDetail');
    box.innerHTML=
      '<h3>已选择：'+city.name+' <small style="color:#8fa8c5">'+city.en+'</small></h3>'+
      '<div style="font-size:11px;color:#b5c9dd;margin-bottom:8px">'+city.role+'</div>'+
      '<div class="miniGrid">'+
      '<div class="mini">市场规模<b>'+city.market+'</b></div>'+
      '<div class="mini">人才密度<b>'+city.talent+'</b></div>'+
      '<div class="mini">生活成本<b>'+city.cost+'</b></div>'+
      '<div class="mini">竞争强度<b>'+city.competition+'</b></div>'+
      '</div>'+
      '<div style="font-size:10px;line-height:1.7;color:#c6d6e5;margin-top:8px">优势：'+city.advantages.join(' · ')+'</div>';
  }

  function focusCity(city){
    selectedCity=city;
    if(controls) controls.autoRotate=false;
    world.pointOfView({lat:city.lat,lng:city.lng,altitude:1.16},950);
    world.pointsData([{lat:city.lat,lng:city.lng,size:.18,color:'#ffd36e'}])
      .pointAltitude(.035).pointRadius(.14).pointColor('color');
    world.labelsData([{lat:city.lat,lng:city.lng,text:city.name}])
      .labelText('text').labelSize(.55).labelDotRadius(.18).labelColor(()=> '#fff')
      .labelResolution(2).labelAltitude(.055);
    renderSelectedCity(city);
    document.querySelectorAll('.cityCard').forEach(el=>el.classList.toggle('selected',el.dataset.city===city.en));
  }

  function renderCities(code){
    const list=document.getElementById('cityList');list.innerHTML='';
    const cities=cityDB[code] || [];
    if(!cities.length){
      const empty=document.createElement('div');
      empty.style.cssText='padding:18px 10px;color:#8fa8c5;font-size:12px;line-height:1.7';
      empty.textContent='这个国家已经可以在地图上选择，但详细城市数据库尚未加入 V4.7。';
      list.appendChild(empty);
      document.getElementById('selectedDetail').innerHTML='<h3>暂无城市数据</h3><div style="font-size:11px;color:#9fb5ca">请选择顶部快捷国家，或点击地图中的已接入国家。</div>';
      return;
    }
    cities.forEach((city,idx)=>{
      const card=document.createElement('div');
      card.className='cityCard'+(idx===0?' selected':'');
      card.dataset.city=city.en;
      const tags=city.tags.map(t=>'<span>'+t+'</span>').join('');
      card.innerHTML=
        '<img class="cityImg" src="'+city.img+'" alt="'+city.name+' 城市实景" loading="lazy" onerror="this.style.display=\'none\'">'+
        '<div class="cityInfo"><div class="cityTopline"><h3>'+city.name+' <small>'+city.en+'</small></h3><span class="cityScore">KDA '+city.kda+'</span></div>'+
        '<p>'+city.role+'</p><div class="cityTags">'+tags+'</div>'+
        '<div class="cityAdvantages">'+city.advantages.slice(0,2).join(' · ')+'</div></div>';
      card.onclick=()=>focusCity(city);
      list.appendChild(card);
    });
    focusCity(cities[0]);
  }

  function selectCountry(code,name,continent,polygonName,focus=true){
    selectedCode=code;
    selectedCountryName=zhName(code,name);
    selectedPolygonName=polygonName || name;
    const base=countryProfiles[code];
    const profile=base || fallbackProfile(code,selectedCountryName,continent);
    if(!base){profile.name=selectedCountryName;profile.en=name||selectedCountryName}
    renderCountry(profile,code,continent);
    renderCities(code);
    if(focus && positions[code]) world.pointOfView(positions[code],900);
  }

  document.getElementById('confirmBtn').onclick=()=>{
    const data={countryCode:selectedCode,country:selectedCountryName,city:selectedCity?.name||'',cityEn:selectedCity?.en||''};
    localStorage.setItem('capitalTrackStart',JSON.stringify(data));
    status.textContent='已保存起点：'+data.country+(data.city?' · '+data.city:'');
  };

  qBox.addEventListener('click',e=>{
    const btn=e.target.closest('button[data-code]');if(!btn)return;
    const code=btn.dataset.code;const p=countryProfiles[code];
    selectCountry(code,p.en,'World',p.en,true);
  });

  fetch('https://cdn.jsdelivr.net/gh/vasturiano/globe.gl/example/datasets/ne_110m_admin_0_countries.geojson')
    .then(r=>r.json()).then(data=>{
      const fs=data.features.filter(f=>(f.properties.ISO_A2||'')!=='AQ');
      const nm=f=>f.properties.ADMIN||f.properties.NAME||'Unknown';
      const iso=f=>{
        const p=f.properties||{};
        const vals=[p.ISO_A2_EH,p.ISO_A2,p.WB_A2,p.POSTAL];
        return vals.find(v=>v && v!=='-99' && v.length===2) || '';
      };
      const refresh=()=>world
        .polygonAltitude(f=>nm(f)===selectedPolygonName?.012:.0018)
        .polygonCapColor(f=>nm(f)===selectedPolygonName?'rgba(46,166,255,.22)':nm(f)===hovered?'rgba(83,190,255,.10)':'rgba(0,0,0,0)')
        .polygonSideColor(()=> 'rgba(18,70,110,.025)')
        .polygonStrokeColor(f=>nm(f)===selectedPolygonName?'#77ddff':'rgba(205,230,248,.30)');
      world.polygonsData(fs)
        .polygonLabel(f=>{
          const code=iso(f);const cn=zhName(code,nm(f));
          return '<div style="padding:7px 9px"><b>'+cn+'</b><br><span style="color:#78d9ff">点击选择国家</span></div>';
        })
        .onPolygonHover(f=>{hovered=f?nm(f):null;refresh();document.body.style.cursor=f?'pointer':'default'})
        .onPolygonClick((f,event,coords)=>{
          const code=iso(f);const name=nm(f);const continent=f.properties.CONTINENT||'World';
          selectedPolygonName=name;refresh();
          if(controls) controls.autoRotate=false;
          selectCountry(code,name,continent,name,false);
          world.pointOfView({lat:coords.lat,lng:coords.lng,altitude:1.46},850);
        });
      selectedPolygonName='China';refresh();
      selectCountry('CN','China','Asia','China',false);
      status.textContent='地图已就绪：拖动地球，点击任意国家；再在右侧选择城市。';
    })
    .catch(err=>{
      console.error(err);
      selectCountry('CN','China','Asia','China',true);
      status.textContent='国家边界暂时未加载；可使用顶部国家快捷入口。';
    });

  window.addEventListener('error',e=>{
    if(e.message) status.textContent='运行提示：'+e.message;
  });
})();
</script>
</body>
</html>
